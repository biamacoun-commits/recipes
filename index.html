<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#b5532a">
<title>My Recipes</title>
<style>
  :root {
    --bg: #faf6f1;
    --card: #ffffff;
    --ink: #2c2420;
    --muted: #8a7d72;
    --accent: #b5532a;
    --accent-soft: #f3e2d8;
    --line: #e8ded3;
    --star: #e3a008;
    --danger: #c0392b;
    --ok: #2e7d32;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.05);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 20;
    background: var(--accent);
    color: #fff;
    padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; max-width: 900px; margin: 0 auto; }
  header h1 { font-size: 1.25rem; margin: 0; font-weight: 700; letter-spacing: .2px; }
  .header-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 16px; }

  button {
    font: inherit; cursor: pointer; border: none; border-radius: 8px;
    padding: 8px 12px; background: var(--accent-soft); color: var(--accent);
    font-weight: 600; transition: filter .15s, background .15s; white-space: nowrap;
  }
  button:hover { filter: brightness(.97); }
  button.primary { background: var(--accent); color: #fff; }
  button.ghost-light { background: rgba(255,255,255,.15); color: #fff; }
  button.ghost-light:hover { background: rgba(255,255,255,.25); }
  button.danger { background: #fbe9e7; color: var(--danger); }
  button.small { padding: 5px 9px; font-size: .85rem; }
  button:disabled { opacity: .5; cursor: not-allowed; }

  /* Controls */
  .controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
  .search-box { display: flex; gap: 8px; }
  input[type=text], input[type=url], input[type=search], select, textarea {
    font: inherit; width: 100%; padding: 10px 12px; border: 1px solid var(--line);
    border-radius: 8px; background: #fff; color: var(--ink);
  }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .chip {
    padding: 6px 12px; border-radius: 999px; background: #fff; border: 1px solid var(--line);
    color: var(--muted); font-size: .88rem; font-weight: 600; cursor: pointer; user-select: none;
  }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip.fav.active { background: var(--star); border-color: var(--star); }

  /* Recipe groups */
  .group-title {
    font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
    margin: 22px 0 10px; font-weight: 700; display: flex; align-items: center; gap: 8px;
  }
  .group-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .cards { display: grid; gap: 12px; }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: var(--shadow); overflow: hidden;
  }
  .card-head { display: flex; align-items: flex-start; gap: 10px; padding: 14px; cursor: pointer; }
  .card-thumb {
    width: 56px; height: 56px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--accent-soft);
  }
  .card-title-wrap { flex: 1; min-width: 0; }
  .card-title { font-weight: 700; font-size: 1.05rem; margin: 0 0 4px; }
  .card-meta { color: var(--muted); font-size: .82rem; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
  .tag {
    font-size: .72rem; font-weight: 600; color: var(--accent); background: var(--accent-soft);
    padding: 2px 8px; border-radius: 999px;
  }
  .star-btn {
    background: none; padding: 4px; font-size: 1.4rem; line-height: 1; color: #d9cfc4;
  }
  .star-btn.on { color: var(--star); }
  .card-body { padding: 0 14px 14px; border-top: 1px solid var(--line); display: none; }
  .card.open .card-body { display: block; }
  .card-body h4 { margin: 14px 0 6px; font-size: .9rem; text-transform: uppercase; letter-spacing: .05em; color: var(--accent); }
  .card-body ul { margin: 0; padding-left: 20px; }
  .card-body p { margin: 6px 0; white-space: pre-wrap; }
  .card-body a { color: var(--accent); word-break: break-all; }
  .card-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

  .empty { text-align: center; color: var(--muted); padding: 50px 20px; }
  .empty h2 { color: var(--ink); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(40,30,24,.5); z-index: 50;
    display: none; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; width: 100%; max-width: 600px; box-shadow: var(--shadow);
    margin: auto;
  }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: #fff; border-radius: 14px 14px 0 0; }
  .modal-head h2 { margin: 0; font-size: 1.15rem; }
  .modal-body { padding: 18px; }
  .modal-foot { display: flex; gap: 8px; justify-content: flex-end; padding: 14px 18px; border-top: 1px solid var(--line); flex-wrap: wrap; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-weight: 600; font-size: .88rem; margin-bottom: 5px; }
  .field .hint { color: var(--muted); font-size: .8rem; font-weight: 400; }
  textarea { resize: vertical; min-height: 90px; }
  .close-x { background: none; font-size: 1.5rem; padding: 0 6px; color: var(--muted); }
  .img-preview { max-width: 100%; max-height: 180px; border-radius: 8px; margin-top: 8px; display: none; }

  /* category checkboxes */
  .cat-checks { display: flex; flex-wrap: wrap; gap: 8px; }
  .cat-check {
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none;
    padding: 7px 12px; border: 1px solid var(--line); border-radius: 999px; font-size: .9rem;
    font-weight: 600; color: var(--muted); background: #fff; margin: 0;
  }
  .cat-check input { width: auto; margin: 0; accent-color: var(--accent); }
  .cat-check.checked { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

  /* Shopping list */
  .shop-recipe-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); }
  .shop-recipe-row input { width: auto; }
  .shop-list { white-space: pre-wrap; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 12px; max-height: 300px; overflow-y: auto; font-size: .92rem; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 999px;
    font-size: .9rem; z-index: 100; opacity: 0; transition: opacity .25s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .count-badge { font-size: .8rem; color: var(--muted); margin-left: 4px; font-weight: 400; }
  @media (max-width: 520px) {
    header h1 { font-size: 1.1rem; }
    .header-actions button span.label { display: none; }
  }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>🍳 My Recipes</h1>
    <div class="header-actions">
      <button class="ghost-light small" id="btnShop" title="Build shopping list">🛒 <span class="label">Shopping</span></button>
      <button class="ghost-light small" id="btnExport" title="Download backup">⬇️ <span class="label">Export</span></button>
      <button class="ghost-light small" id="btnImport" title="Restore from backup">⬆️ <span class="label">Import</span></button>
      <button class="primary small" id="btnAdd">＋ <span class="label">Add</span></button>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="controls">
    <div class="search-box">
      <input type="search" id="search" placeholder="Search recipes or ingredients…" autocomplete="off">
    </div>
    <div class="chips" id="categoryChips"></div>
  </div>
  <div id="recipeList"></div>
</div>

<!-- Add / Edit modal -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="editTitle">Add Recipe</h2>
      <button class="close-x" data-close>&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f_id">
      <div class="field">
        <label for="f_title">Title</label>
        <input type="text" id="f_title" placeholder="e.g. Grandma's Lasagne">
      </div>
      <div class="field">
        <label>Categories <span class="hint">(tick all that apply)</span></label>
        <div class="cat-checks" id="catChecks"></div>
      </div>
      <div class="field">
        <label for="f_ingredients">Ingredients <span class="hint">(one per line)</span></label>
        <textarea id="f_ingredients" placeholder="2 cups flour&#10;1 tsp salt&#10;3 eggs"></textarea>
      </div>
      <div class="field">
        <label for="f_method">Method / Steps</label>
        <textarea id="f_method" placeholder="1. Preheat oven to 180°C&#10;2. Mix dry ingredients…"></textarea>
      </div>
      <div class="field">
        <label for="f_source">Source link <span class="hint">(e.g. Pinterest URL — optional)</span></label>
        <input type="url" id="f_source" placeholder="https://…">
      </div>
      <div class="field">
        <label for="f_notes">Notes <span class="hint">(optional)</span></label>
        <textarea id="f_notes" style="min-height:60px" placeholder="Family favourite, double the sauce…"></textarea>
      </div>
      <div class="field">
        <label for="f_image">Photo <span class="hint">(optional — auto-shrunk to save space)</span></label>
        <input type="file" id="f_image" accept="image/*">
        <img class="img-preview" id="imgPreview" alt="preview">
      </div>
    </div>
    <div class="modal-foot">
      <button class="danger" id="btnDelete" style="margin-right:auto; display:none;">Delete</button>
      <button data-close>Cancel</button>
      <button class="primary" id="btnSave">Save Recipe</button>
    </div>
  </div>
</div>

<!-- Shopping list modal -->
<div class="modal-bg" id="shopModal">
  <div class="modal">
    <div class="modal-head">
      <h2>🛒 Shopping List</h2>
      <button class="close-x" data-close>&times;</button>
    </div>
    <div class="modal-body">
      <p class="hint" style="margin-top:0; color:var(--muted)">Tick the recipes you're cooking, then generate a combined ingredients list to copy into the Woolworths app.</p>
      <div id="shopRecipes"></div>
      <div id="shopOutput" style="display:none; margin-top:16px;">
        <h4 style="margin:0 0 8px; color:var(--accent)">Combined ingredients</h4>
        <div class="shop-list" id="shopList"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button data-close>Close</button>
      <button id="btnGenList">Generate list</button>
      <button class="primary" id="btnCopyList" style="display:none;">📋 Copy list</button>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept="application/json,.json" style="display:none;">
<div class="toast" id="toast"></div>
<script>window.SEED_RECIPES = [{"id": "r1", "title": "Ikarian Longevity Stew", "ingredients": "1 cup dried black-eyed peas (or 8-ounce can, drained)\n3/4 cup extra-virgin olive oil, divided\n1 large red onion, finely chopped\n4 garlic cloves, finely chopped\n1 small bulb fennel, finely chopped\n2 tablespoons tomato paste, diluted in 1/2 cup water\n2 bay leaves\n1 bunch dill, finely chopped\nsalt (optional)", "method": "If using dried black-eyed peas: Cover with water and bring to a boil for 1 minute. Remove from heat, cover, and let stand for an hour. Drain and rinse. (If using canned, skip this step.)\nIn a large pot, heat half the olive oil over medium heat and cook the onion, garlic, and fennel, stirring occasionally, until soft, about 12 minutes.\nAdd the black-eyed peas and toss to coat with oil. Add the tomato paste, and enough water to cover the beans by about an inch. Add the bay leaves.\nBring pot to a boil, reduce heat, and simmer until the peas are about halfway cooked. Check after 40 minutes; it may take over an hour. If using canned, skip to next step after 10 minutes.\nAdd the chopped dill and season with salt to taste. Continue cooking until the peas are tender, about 20 minutes.\nRemove from heat and discard the bay leaves. Pour in remaining olive oil, stir, and serve.", "source": "", "notes": "Total cook time ~80 minutes. Makes 4 servings. By Dan Buettner (Blue Zones). Mediterranean / plant-based.", "favorite": false, "createdAt": 1782000000000, "categories": ["Vegan/Vegetarian"]}, {"id": "r2", "title": "Broccoli and Orecchiette with Yoghurt and Peas", "ingredients": "500 g orecchiette pasta\n2 broccoli heads (about 1 kg), cut into florets\n320 g frozen peas, thawed\n1/2 cup basil leaves, roughly torn\n1 tablespoon pine nuts, toasted\n1/2 teaspoon dried chilli flakes (optional)\nsea salt and black pepper\n\nYOGHURT AND PEA DRESSING\n500 g (2 cups) Greek yoghurt\n2 garlic cloves, crushed\n3 tablespoons extra-virgin olive oil, plus extra if necessary\n80 g frozen peas, thawed\nsea salt and black pepper", "method": "Make the dressing: in a food processor, add the yoghurt, garlic, olive oil, thawed peas and two big pinches of salt and pepper and blitz to a smooth, pale-green sauce the consistency of pouring cream. Add more olive oil if required.\nCook the pasta in plenty of salted boiling water until al dente. Drain and refresh under cold running water.\nIn a large pot of salted boiling water, cook the broccoli for about 3 minutes until just tender. Just before it is ready, add the peas for 30 seconds to warm through. Drain and refresh.\nAdd the warm pasta to the yoghurt sauce a little at a time (adding it all at once may split the yoghurt). Add the peas, broccoli and basil leaves. Serve scattered with pine nuts and, if using, chilli flakes. Finish with salt and pepper.", "source": "", "notes": "Serves 4-6. From 'Everybody Loves Brassicas'.", "favorite": false, "createdAt": 1782000000001, "categories": ["Pastas", "Vegan/Vegetarian"]}, {"id": "r3", "title": "Mediterranean Cod One-Pot", "ingredients": "6 tbsp extra-virgin olive oil\n2 shallots, roughly chopped\n4 garlic cloves, finely chopped\n3 large tomatoes, roughly chopped\n1 romano red pepper, deseeded and roughly chopped\n15g coriander, leaves and stalks roughly chopped\n400g leeks, washed, trimmed and roughly chopped\n1 tsp sweet paprika\n1 tsp chilli powder\n300ml vegetable or chicken stock\n300g cooked puy lentils (or from a packet)\n400g boneless, skinless cod fillets\n1/2 tbsp dried chilli flakes\ngrated zest and juice of 1/2 lemon\nsea salt and freshly ground black pepper", "method": "Heat 3 tablespoons of the oil in a saucepan over a medium heat, add the shallots and garlic and saute for a few minutes until soft. Add the tomatoes, red pepper, coriander stalks, leeks, sweet paprika and chilli powder, season and cook, stirring, for 2 minutes.\nPour in the stock and puy lentils and simmer for 5 minutes. Add the cod, cover and cook for a further 8 minutes, until the fish is cooked through.\nMix the remaining oil in a bowl with the chilli flakes and coriander leaves, then stir in the lemon zest and juice.\nServe the stew in large bowls with the dressing drizzled on top.", "source": "", "notes": "Serves 4. TIP: Try white beans, chickpeas or kidney beans instead of lentils; harissa or chipotle also work well.", "favorite": false, "createdAt": 1782000000002, "categories": ["Fish"]}, {"id": "r4", "title": "Crispy Tofu & Broccoli Pad Thai", "ingredients": "FOR THE TOFU AND BROCCOLI\n250g flat wide rice noodles\n250g block of firm tofu\n250g purple-sprouting broccoli\nneutral oil for frying\n2 tablespoons soy or tamari sauce\n3 cloves garlic, peeled and finely chopped\n2cm piece ginger, peeled and finely chopped\n4 spring onions, thinly sliced\n2 organic eggs (optional)\n100g beansprouts\n\nFOR THE SAUCE\n4 tablespoons tamarind paste\n1 tablespoon vegetarian fish sauce\n2 tablespoons rice vinegar\n3 tablespoons maple syrup\n3 tablespoons lighter soy sauce\n\nTO SERVE\n100g roasted unsalted peanuts, roughly chopped\n2 red chillies, finely chopped\nThai basil leaves, shredded\nmint leaves, shredded\ncrispy shallots\n2 unwaxed limes", "method": "Soak the rice noodles in cold water for at least 10 minutes until softened. Press the tofu between kitchen paper under a weight for half an hour to dry out.\nMix all the sauce ingredients in a small bowl with 4 tablespoons of cold water. Cut the broccoli into florets and thinly slice the stalks, keeping them separate.\nSlice the tofu into 1cm-thick pieces. In a large non-stick pan or wok, heat 3 tablespoons of oil over medium-high heat and fry the tofu for 6-8 minutes, turning every minute, until golden. Add the soy sauce and stir for another 30 seconds (it may spit). Lift the tofu out and keep warm.\nWipe the pan, add more oil and heat over medium. Add the garlic and ginger and cook for 2 minutes, then add the broccoli stalks, drained noodles and 6 tablespoons of water and cook 3-4 minutes. Add the florets, sauce and most of the spring onions with 2 more tablespoons of water. Cook another 3-4 minutes until the noodles are soft.\nIf using eggs, push the noodles aside, add a little oil and the eggs, pierce the yolks, scramble, then mix in.\nOff the heat, fold through the beansprouts. Spoon onto warm plates and top with peanuts, remaining spring onions, chillies, herbs and crispy shallots. Squeeze over lime juice and serve with lime wedges.", "source": "", "notes": "Serves 4. One Pan.", "favorite": false, "createdAt": 1782000000003, "categories": ["Stir Fry", "Vegan/Vegetarian"]}, {"id": "r5", "title": "Sweetcorn Chana Curry", "ingredients": "1 sweetcorn cob (150g)\n2 tbsp coconut oil\n1/2 white onion, finely chopped\n1/2 tsp turmeric\n1 tsp cumin seeds\n1 tsp coriander seeds\n1 star anise\n1/2 tsp chilli powder\n400g tin chickpeas, drained and rinsed\n50ml coconut cream\nsea salt and freshly ground black pepper\n1 large tomato, finely diced, to serve\nsmall bunch of coriander, finely chopped, to serve", "method": "Grate the sweetcorn cob into a bowl using a box grater; it should be liquid and creamy.\nMelt the coconut oil in a saucepan over medium heat, add the onion, turmeric, cumin and coriander seeds and star anise and saute for a few minutes until softened. Stir in the chilli powder and grated sweetcorn and cook for 2 minutes, then add the chickpeas and coconut cream and simmer for 6-8 minutes until soft and creamy. Season to taste.\nServe garnished with the diced tomato and chopped coriander.", "source": "", "notes": "Serves 2. TIP: 2 tsp garam masala works instead of the whole spices. Great with wild rice and chopped spinach.", "favorite": false, "createdAt": 1782000000004, "categories": ["Curries", "Vegan/Vegetarian"]}, {"id": "r6", "title": "Slow-cooked Chickpeas, Green Beans & Eggplant", "ingredients": "1 cup dried chickpeas\n1 tsp apple cider vinegar\n1 tbsp coriander seeds\n2 tsp cumin seeds\n2 tbsp olive oil, plus extra to serve\n1 brown onion (210g), sliced\n3 garlic, minced\n2 tsp sweet paprika\n6 medium tomatoes (550g), roughly chopped\n1 medium eggplant (350g), large cubes\n1 handful green beans (130g), tops removed\n2 1/2 cups vegetable broth or stock of choice\n1/2 cup coconut cream\n1 tbsp tamari\nsalt and pepper\n\nTo serve\n1 spring onion, finely chopped\n2 tbsp fennel tops", "method": "Put the chickpeas in a bowl with apple cider vinegar and cover with water. Soak 6-8 hours. Rinse well.\nIn a mortar and pestle, grind the coriander and cumin seeds.\nHeat olive oil in a fry pan over medium-high. Add the onion and saute 3-4 minutes until soft and caramelised. Add the ground coriander and cumin, garlic and sweet paprika and fry, stirring, a further 2 minutes.\nAdd the onion mixture to a slow cooker with the soaked chickpeas, tomatoes, eggplant, beans, broth, coconut cream and tamari. Season. Cook on high for 6-8 hours until reduced slightly and the chickpeas and eggplant are tender.\nServe garnished with spring onion and fennel tops.", "source": "", "notes": "Soak 6-8 hrs. Cook 6-8 hrs. Serves 4-5. Slow cooker required.", "favorite": false, "createdAt": 1782000000005, "categories": ["Slow Cooker", "Vegan/Vegetarian"]}, {"id": "r7", "title": "Jambalaya", "ingredients": "3 tbsp extra-virgin olive oil, plus extra for drizzling\n2 red onions, thinly sliced\n4 garlic cloves, finely chopped\n3 tsp Creole/Cajun spice mix\n10g fresh thyme leaves\n1 bay leaf\n3 celery stalks, finely chopped\n150g leeks, trimmed and finely chopped\n1 yellow pepper, deseeded and cut into thin strips\n100g puy lentils, soaked at least 20 minutes, drained\n200g red Camargue (or wholegrain) rice, soaked at least 20 minutes, drained\n400g tin chopped tomatoes\n300ml vegetable stock\n200ml water\n200g collard greens, roughly chopped (or kale, cavolo nero, spring greens)\nsea salt and freshly ground black pepper\n20g fresh parsley, finely chopped, to serve", "method": "Heat the oil in a large frying pan over medium heat, add the onions and garlic and saute for 2-3 minutes. Add the spice mix, thyme, bay leaf, celery, leeks and yellow pepper, stir and cook a further 3 minutes.\nAdd the lentils and rice with a good amount of salt and pepper. Stir to coat in the spices and cook about 3 minutes, then add the tinned tomatoes and stock. Cover and simmer for 22-25 minutes until the liquid is absorbed and everything is cooked.\nMeanwhile, bring the water to the boil in a small saucepan, add the collard greens, cover and cook 6 minutes until wilted. Drain and drizzle with olive oil.\nGarnish the jambalaya with parsley and serve with the greens.", "source": "", "notes": "Serves 4. Plant-based; sometimes served with grilled prawns.", "favorite": false, "createdAt": 1782000000006, "categories": ["Vegan/Vegetarian"]}, {"id": "r8", "title": "Easy Peasy Pasta", "ingredients": "2 red onions\n4 garlic cloves\n2 red peppers\n100g sun-dried tomatoes\n40g baby leaf spinach\n50g capers\n2 small courgettes\n100g pitted Kalamata olives\n500g cherry tomatoes\n8 tbsp oil (ideally from the sun-dried tomato jar)\n350g passata\n320g fusilli\n30g basil leaves\nsalt and black pepper", "method": "Preheat oven to 180C.\nPeel and finely slice the onions and garlic. Deseed and slice the peppers into thin strips. Slice the sun-dried tomatoes. Finely chop the spinach and capers and chop the courgettes into bite-sized chunks. Halve the olives and cherry tomatoes.\nPut all the vegetables into a lasagne dish and season. Pour over the oil and passata and stir to coat. Cover with foil and roast for 30 minutes.\nRemove the foil, stir, and roast a further 15 minutes.\nMeanwhile cook the pasta in salted boiling water until al dente. Drain and return to the pan.\nStir the basil into the roasted veg, then pour the sauce over the pasta. Mix well and serve.", "source": "", "notes": "Serves 4. Quick Eats. From BOSH!", "favorite": false, "createdAt": 1782000000007, "categories": ["Pastas", "Vegan/Vegetarian"]}, {"id": "r9", "title": "Kitchari", "ingredients": "2 cups brown rice\n2 cups chana dal or moong dal\n3 tbsp fresh ginger, grated with skin on\n2 tbsp ghee or coconut oil\n1 tbsp fresh turmeric, grated with skin on\n2 Dutch cream potatoes (400g), medium cubes with skin on\n1 sweet potato (400g), medium cubes with skin on\n2 cups kale (100g), finely chopped\n1 lime (2 tbsp juice and 1 tsp zest)\n2 tbsp tamari, plus extra to serve\n\nDried spices\n12 cardamom pods\n2 tsp ground turmeric\n1 tsp cumin seeds\n1 tsp coriander seeds\n1 tsp mustard seeds\n1 tsp ground cinnamon\n1 tsp fennel seeds\n1/2 tsp caraway seeds\n1/2 tsp pepper\n\nTo serve\ncoconut or plain yoghurt\nlime wedges\ncoriander leaves", "method": "Soak rice and dal for 4-8 hours in filtered water. Rinse well.\nIn a mortar and pestle, grind the dried spices.\nIn a large pot over medium heat, add the dried spices, ginger, ghee and fresh turmeric. Stir 1-2 minutes to release the flavours.\nAdd the rice and dal. Fry off a further 3 minutes.\nAdd 8 cups of water, the potatoes and sweet potato. Bring to the boil then simmer 30-40 minutes until it becomes a porridge consistency.\nStir through kale, lime juice and zest and tamari.\nServe with yoghurt, lime wedges, extra tamari and coriander leaves.", "source": "", "notes": "Soak 4-8 hrs. Serves 4-6. Ayurvedic; freezes well.", "favorite": false, "createdAt": 1782000000008, "categories": ["Vegan/Vegetarian"]}, {"id": "r10", "title": "Eggplant Parmigiana", "ingredients": "2/3 cup olive oil\n1 medium onion, finely chopped\n2 garlic cloves, crushed\n1 x 400g can chopped tomatoes\n1/4 tsp dried chilli flakes\nsalt and freshly ground black pepper\n1 large eggplant, thickly sliced\n1/4 cup all-purpose flour\n1/3 cup fresh basil leaves\n225g bocconcini mozzarella, thinly sliced\n2/3 cup finely grated parmesan cheese\n1/2 tsp sweet paprika\nsmall basil leaves, extra, to garnish", "method": "Preheat oven to 180C (350F).\nHeat 1 tbsp of oil in a large frying pan over medium heat; cook onion, stirring, until soft. Add the garlic; cook until fragrant. Stir in the tomatoes and chilli; season. Transfer to a jug.\nToss the eggplant in flour to coat; shake off excess. Heat the remaining oil in the cleaned pan; cook the eggplant in batches until browned on both sides. Drain on paper towel.\nSpray a 23 x 23cm ovenproof dish. Layer 1/4 cup tomato mixture in the base. Add half the eggplant, season, top with half the remaining tomato, the basil and the mozzarella. Repeat with remaining eggplant, tomato and basil, season, then finish with the parmesan. Sprinkle with paprika.\nBake covered for 30 minutes. Uncover and bake a further 15 minutes until browned and tender. Serve topped with extra basil.", "source": "", "notes": "Vegetarian. Serves 4. Serve with salad and crusty bread, or stir through short pasta.", "favorite": false, "createdAt": 1782000000009, "categories": ["Vegan/Vegetarian"]}, {"id": "r11", "title": "Middle-Eastern Spiced Chickpea Salad", "ingredients": "FOR THE SPICED CHICKPEAS\n2 x 400g tins chickpeas\n1 tbsp olive oil\n1 tsp smoked paprika\n2 tsp ground cumin\n2 tsp ground coriander\na pinch of salt\n\nFOR THE SALAD\n1 medium cucumber\n250g cherry tomatoes\n1 ripe avocado\n1 lemon\n20g fresh mint\n120g baby leaf salad\nsalt and black pepper\n\nFOR THE DRESSING\n1 tbsp tahini\n1 tbsp maple syrup\n1/2 tbsp olive oil\n1/2 tsp salt\n2 tsp water", "method": "Preheat oven to 180C. Line a baking tray with parchment.\nDrain, rinse and pat dry the chickpeas. Toss with the olive oil, smoked paprika, cumin, coriander and salt. Spread on the tray and roast for 25 minutes.\nTrim and quarter the cucumber, then cut into small chunks. Halve the cherry tomatoes. Stone, peel and dice the avocado. Halve the lemon. Pick and roughly chop the mint.\nTip the roasted chickpeas into a bowl. Add the cucumber, tomatoes, half the mint and the avocado. Squeeze over both lemon halves, add olive oil and toss. Season.\nMix all the dressing ingredients until smooth. Toss the baby leaf salad through the dressing. Serve the salad in bowls, scatter over the remaining mint, drizzle over the dressing and eat immediately.", "source": "", "notes": "Serves 4. ~345 kcal. From 'Greens'/'Greener'.", "favorite": false, "createdAt": 1782000000010, "categories": ["Salad", "Vegan/Vegetarian"]}, {"id": "r12", "title": "Satay Salad", "ingredients": "FOR THE SALAD\n160g soba noodles\n100g frozen peas\n100g sugar snap peas or mangetout\n2 pak choi\n50g baby corn\n30g fresh coriander\n20g unsalted peanuts\n1 red pepper\n1 medium carrot\n40g fresh baby spinach leaves\n1 tbsp black sesame seeds\n\nFOR THE SAUCE\n1 large garlic clove\n5cm piece fresh ginger\n1 lime\n1 tbsp sesame oil\n1/2 tsp chilli flakes\n4 tsp soy sauce\n2 tbsp maple syrup\n4 tbsp smooth peanut butter\n6 tbsp water", "method": "Make the sauce: peel and grate the garlic and ginger. Halve the lime. Heat the sesame oil over medium heat. Add the garlic, ginger and chilli flakes and stir 30 seconds until aromatic. Turn the heat to low, add the soy sauce and maple syrup and stir. Add the peanut butter and stir until combined. Squeeze in the lime juice, add the water and stir to a smooth, creamy sauce. Set aside.\nCook the noodles per packet. Cover the peas with boiled water for 1 minute, then drain (keeping the water). Halve the sugar snaps lengthways. Trim and add the pak choi to the pea water briefly. Pick the coriander, lightly crush the peanuts, slice the pepper, peel the carrot into thin strips. Drain and rinse the peas and pak choi under cold water.\nAdd the noodles to a salad bowl and stir through the sauce. Add the peas, sugar snaps, pak choi, pepper, carrot and spinach and toss. Serve in bowls topped with coriander, black sesame seeds and peanuts. Squeeze over lime wedges and serve.", "source": "", "notes": "Serves 2. From 'Greens'/'Greener'.", "favorite": false, "createdAt": 1782000000011, "categories": ["Salad", "Vegan/Vegetarian"]}, {"id": "r13", "title": "Thai Red Curry", "ingredients": "1 red pepper\n1 green pepper\n1 fresh red chilli\n200g mushrooms\n60g baby corn\n2 tbsp vegetable oil\n1 x 400ml tin coconut milk\n150ml vegetable stock\n1 tbsp palm sugar (or regular sugar)\n2 tbsp agave syrup\n4 tbsp soy sauce\n160g baby plum tomatoes\n50g mangetout\n1/2 x 425g tin lychees, optional\n\nFOR THE THAI RED CURRY PASTE (MAKES 300G)\n1 tsp cumin seeds\n2 tbsp coriander seeds\n2cm piece fresh ginger\n3 shallots\n5 garlic cloves\n2 lemongrass stalks\n3 fresh red chillies\n1 red bird's eye chilli, optional\n1 tsp black peppercorns\n1/2 roasted red pepper from a jar\n2 tbsp tomato puree\n3 kaffir lime leaves\n1/2 lime\n10g fresh coriander, plus extra\n2 tsp salt\n50ml water", "method": "Make the paste: toast the cumin and coriander seeds in a dry pan for 2 minutes. Peel and roughly chop the ginger, shallots, garlic and lemongrass. Deseed the chillies if you prefer milder. Blitz the toasted seeds with the ginger, shallots, garlic, lemongrass, fresh chillies, bird's eye chilli (if using), peppercorns, roasted red pepper, tomato puree and lime leaves. Squeeze in the lime juice, add the coriander, salt and a splash of water and whizz smooth, adding up to 50ml water. Use 100g and freeze the rest in 100g batches.\nDeseed and chop the peppers into 2cm chunks. Slice 2 chillies, slice the mushrooms, halve the baby corn.\nHeat the oil in a wok over high heat. Add 100g curry paste and fry 2 minutes until fragrant. Pour in the coconut milk and stock and stir. Add the sugar, agave, soy sauce, mushrooms, baby corn, tomatoes and mangetout. Drain and add the lychees if using. Bring to the boil and simmer 7-10 minutes until the vegetables are cooked. Taste and adjust.\nSpoon into bowls, garnish with coriander and serve with white rice.", "source": "", "notes": "Serves 4. Paste makes 300g; use 100g here and freeze the rest.", "favorite": false, "createdAt": 1782000000012, "categories": ["Curries", "Vegan/Vegetarian"]}, {"id": "r14", "title": "Green Quinoa Risotto", "ingredients": "1 onion, finely chopped\n1 garlic clove, finely chopped\nolive oil\n175g quinoa\n1 vegetable stock cube\n400ml boiling water\nabout 15 asparagus spears (or 15 stems Tenderstem broccoli)\n1 courgette, halved lengthways and cut into half moons\n150g frozen peas\njuice of 1 lemon\n1 teaspoon Dijon mustard\n3 tablespoons almond or oat milk\n1 teaspoon nutritional yeast\nhandful of rocket\nsalt and pepper", "method": "Put the onion and garlic into a saucepan over medium heat with a drizzle of olive oil, salt and pepper and gently cook about 5 minutes until softened.\nStir the quinoa into the mixture. Dissolve the stock cube in the boiling water and pour in. Bring to the boil, then simmer for 10-12 minutes until the quinoa is light and fluffy.\nWhile the quinoa cooks, chop the woody ends off the asparagus and slice the stems into rounds. Saute with the courgette half-moons in a frying pan with olive oil and salt until soft.\nMake the pea puree: cover the frozen peas with boiling water for a couple of minutes, drain, then blend with the lemon juice, 3 tablespoons olive oil, mustard, almond milk, nutritional yeast and seasoning until smooth.\nStir the pea puree, courgette and asparagus into the quinoa. Top each serving with rocket and lots of pepper.", "source": "", "notes": "Nut free. Serves 4. TIP: Pearl barley works too (200g, cook 45-50 min).", "favorite": false, "createdAt": 1782000000013, "categories": ["Vegan/Vegetarian"]}, {"id": "r15", "title": "Chickpea & Tomato Salad with Quick Pickled Onions", "ingredients": "1 x 400g tin chickpeas, drained and rinsed\nolive oil\n12 cherry tomatoes\nchilli flakes\n1 ripe mango, peeled and stoned\n1 ripe avocado, peeled and stoned\nhandful of fresh coriander (about 15g)\n2 large handfuls of rocket\nsalt\n\nFOR THE QUICK PICKLED ONIONS\n1 red onion\njuice of 1 lemon\n1 tablespoon apple cider vinegar\n1 tablespoon maple syrup\n4 tablespoons boiling water\ngenerous sprinkle of salt", "method": "Make the pickled onions: dice the onion finely, place in a bowl and pour over the remaining ingredients. Stir and set aside, stirring now and again. The longer they sit the better.\nDry the chickpeas and place in a large frying pan with a drizzle of olive oil, salt and chilli flakes in a single layer. Toast on high heat, stirring now and again, until cooked through. Leave to cool a minute or two.\nChop the tomatoes into quarters, cube the mango and avocado, and finely chop the coriander. Place in a salad bowl with the rocket and a sprinkle of salt, then stir in the chickpeas, the onions and half the pickling liquid.", "source": "", "notes": "Nut free. Serves 2 as a main, 4 as a side.", "favorite": false, "createdAt": 1782000000014, "categories": ["Salad", "Vegan/Vegetarian"]}, {"id": "r16", "title": "Tomato & Lentil Salad", "ingredients": "1 x 195g jar sun-dried or semi-dried tomatoes in oil, drained and roughly chopped\n100g pitted green olives, quartered\n100g pine nuts (toasted; or sunflower seeds for nut free)\n1 x 400g tin green lentils, drained and rinsed\n1 red onion, finely sliced\n20g parsley, roughly chopped\n100g rocket\npinch of sea salt\n\nFOR THE DRESSING\n3 tablespoons oil from the tomato jar, or olive oil\n1 teaspoon Dijon mustard\n1 tablespoon apple cider vinegar\n1 tablespoon tahini", "method": "Place all the salad ingredients in a large bowl and mix together well.\nPut all the dressing ingredients into a small bowl and stir together.\nWhen ready to serve, mix the dressing through the salad.", "source": "", "notes": "Nut free (with sunflower swap). Serves 2.", "favorite": false, "createdAt": 1782000000015, "categories": ["Salad", "Vegan/Vegetarian"]}, {"id": "r17", "title": "Garlicky Broccoli & Beans", "ingredients": "FOR THE BEANS\n1 head of broccoli, thick stalk removed\n4 garlic cloves, crushed or finely diced\nolive oil\n2 x 400g tins of butter beans\n12 cherry tomatoes\n1 small courgette, grated\n1 tablespoon plain yoghurt (we use coconut yoghurt)\ngrated zest of 1 lemon\nsalt and pepper\n\nFOR THE PESTO\n40g almonds, toasted (or sunflower seeds for nut-free)\n2 garlic cloves, roasted\nhandful of fresh basil (about 20g)\njuice of 1/2 lemon\n6-10 tablespoons olive oil\n4 tablespoons water\n1 teaspoon nutritional yeast", "method": "To make the pesto, add all the ingredients to a blender, season and blitz until smooth, adding more oil or water if needed to blend.\nCut the broccoli into small, bite-sized pieces.\nBlanch the broccoli by covering with boiling water for 2-3 minutes until softened but with bite, then drain.\nAdd the garlic to a large frying pan over medium heat with olive oil and salt. Cook about 2 minutes, then add the broccoli, butter beans and cherry tomatoes. Stir in the courgette, yoghurt, lemon zest, pesto and pepper.", "source": "", "notes": "Nut free (with sunflower swap). Serves 2 as a main, 4 as a side.", "favorite": false, "createdAt": 1782000000016, "categories": ["Vegan/Vegetarian"]}, {"id": "r18", "title": "Miso Aubergine Stew", "ingredients": "2 aubergines, cut into bite-sized pieces\nolive oil\n250g button mushrooms, halved\n1 onion, diced\n2 garlic cloves, diced\n2 tablespoons brown rice miso paste\n2 tablespoons tamari\n2 tablespoons almond butter\n2 x 400g tins of coconut milk\njuice of 1 lime\n2 spring onions, finely sliced\nhandful of coriander, roughly chopped\nsalt and pepper", "method": "Preheat the oven to 200C fan.\nPlace the aubergines on a baking tray, drizzle with olive oil and a pinch of salt. Roast for 40 minutes until soft, adding the mushrooms halfway through.\nPlace a large saucepan over medium heat with a drizzle of olive oil. Add the onion, garlic and a pinch of salt and pepper and cook 5-10 minutes until softened.\nAdd the miso, tamari and almond butter and cook a further 2 minutes, then add the coconut milk and lime juice and stir.\nCover, bring to the boil, then simmer for 30 minutes.\nAdd the roasted aubergines and mushrooms and mix well.\nSpoon into bowls and sprinkle over the spring onions and coriander.", "source": "", "notes": "Freezes well. Serves 4.", "favorite": false, "createdAt": 1782000000017, "categories": ["Vegan/Vegetarian"]}, {"id": "r19", "title": "No-Waste Cauliflower Bowl", "ingredients": "1 large cauliflower, with leaves\n1 teaspoon ground turmeric\n1 teaspoon ground cumin\nolive oil\n1 x 400g tin of butter beans, drained and rinsed\n1 teaspoon Dijon mustard\n1 teaspoon apple cider vinegar\n1 teaspoon dried rosemary\n1 teaspoon dried thyme\njuice of 1/2 lemon\n1 tablespoon almond or oat milk\n2 garlic cloves, roasted\nhandful of toasted pine nuts\nhandful of fresh parsley, roughly chopped\nsalt and pepper", "method": "Preheat the oven to 230C fan.\nChop the leaves and stem away from the florets and set aside. Cut the head into bite-sized florets and place in a baking tray with the turmeric, cumin, a drizzle of olive oil and seasoning. Mix to coat.\nSlice the stalks into bite-sized pieces. Place the stalks and leaves on a separate tray (kept apart), drizzle with olive oil and salt.\nRoast both trays for 10 minutes.\nRemove the leaves-and-stalks tray; continue roasting the florets a further 10-15 minutes until lightly charred.\nMake the mash: put the butter beans into a food processor with the roasted stalks, mustard, vinegar, rosemary, thyme, lemon juice, almond milk, garlic and salt. Pulse until smooth.\nDivide the mash between bowls and top with the roasted florets and leaves. Finish with toasted pine nuts and parsley.", "source": "", "notes": "Nut free. Serves 2 large or 4 smaller.", "favorite": false, "createdAt": 1782000000018, "categories": ["Vegan/Vegetarian"]}, {"id": "r20", "title": "Tofu Yaki", "ingredients": "140g firm tofu\n5cm piece fresh ginger\n2 garlic cloves\n1 small fresh green chilli\n5 spring onions\n200g shiitake mushrooms\n1 red pepper\n1 medium carrot\n100g vegan noodles (wholewheat)\n1 tbsp rapeseed oil\n1 tbsp maple syrup\n1/2 tsp sesame oil\n1/2 tbsp hoisin sauce\n2 tsp soy sauce\n100g beansprouts\n1 tsp sesame seeds\nsalt and black pepper", "method": "Press the tofu between tea towels under a weight for 10 minutes. Cut the ginger into fine matchsticks, thinly slice the garlic, deseed and slice the chilli, slice the spring onions, roughly chop the shiitake, thinly slice the red pepper, peel the carrot into ribbons.\nCook the noodles per packet.\nHeat the rapeseed oil in a wok over medium heat. Add the ginger, garlic, chilli and most of the spring onions and cook 1 minute until fragrant. Add the sesame oil and maple syrup and stir 30 seconds. Crumble in the pressed tofu, let it brown for a minute, then stir 2-3 minutes. Add the shiitake, red pepper and hoisin and stir 2-3 minutes.\nAdd the carrot and cook 1 minute, then add the drained noodles. Add the soy sauce and toss, cooking 2 minutes. Add the beansprouts and toss 1 minute. Season. Serve in bowls garnished with remaining spring onions and sesame seeds.", "source": "", "notes": "Serves 2. From BOSH! Lighter. Swap soy for tamari to make gluten-free.", "favorite": false, "createdAt": 1782000000019, "categories": ["Stir Fry", "Vegan/Vegetarian"]}, {"id": "r21", "title": "Smashed Chickpeas with Broccoli and Dukkah", "ingredients": "1 garlic clove\n750 g cooked chickpeas (about 3 cans), drained\n3-4 tablespoons extra-virgin olive oil, plus extra for drizzling\n1/2 teaspoon dried chilli flakes\njuice of 1/2 lemon\n2 tablespoons Greek yoghurt\n3 broccoli heads (about 1.5 kg), cut into florets\n1/3 cup mint leaves\nsea salt and black pepper\n\nDukkah (makes 2 cups)\n1/4 cup coriander seeds\n1 tablespoon fennel seeds\n2 tablespoons cumin seeds\n1 tablespoon white peppercorns\n1/4 cup sesame seeds\n1 teaspoon black sesame seeds\n2 teaspoons nigella seeds\n3/4 cup hazelnuts, skinned and toasted\n1/4 cup sunflower seeds, toasted\n2 teaspoons sea salt\n2 teaspoons paprika", "method": "Make the dukkah: toast the coriander and fennel seeds in a dry pan for 30 seconds. Add the cumin and peppercorns and toast another 20 seconds until they pop; tip into a bowl. Lightly toast the sesame and nigella seeds for a minute and add to the spices. Pound the hazelnuts coarsely in a mortar, add all the toasted seeds and spices and pound again. Mix through the salt and paprika; keep chunky.\nFor the chickpeas, pound the garlic with salt and pepper to a paste. Add the chickpeas a tablespoon at a time and smash roughly. Stir in 2-3 tablespoons olive oil with the chilli flakes, lemon juice and yoghurt to a chunky consistency.\nCoat the broccoli in the remaining olive oil and season. Char on a smoking-hot chargrill pan or barbecue for a minute or so, turning, until charred all over.\nSpread the smashed chickpeas on a platter, lay the broccoli on top, and scatter over most of the dukkah and the mint with a drizzle of olive oil.", "source": "", "notes": "Serves 4-6. Omit the yoghurt for a vegan dish. Spare dukkah keeps in an airtight jar.", "favorite": false, "createdAt": 1782000000020, "categories": ["Vegan/Vegetarian"]}, {"id": "r22", "title": "Sun-Dried Tomato Pasta", "ingredients": "4 portions of pasta (about 80g per person)\n2 garlic cloves, finely diced\n12 cherry tomatoes\nlarge handful of spinach (about 50g)\nsalt\n\nFor the sauce\nabout 75g pine nuts (or sunflower seeds for nut free)\n2 garlic cloves, crushed\nolive oil\n170g sun-dried (or sun-blushed) tomatoes in oil, plus 3 tablespoons of the oil\njuice of 1/2 lemon\n1 tablespoon balsamic vinegar\n8-10 tablespoons water", "method": "Cook the pasta per packet.\nMake the sauce: toast the pine nuts in a large dry frying pan over medium heat for 2-3 minutes until golden; remove and set aside. Add the crushed garlic to the pan with a drizzle of olive oil and saute 2 minutes. Blend the sun-dried tomatoes and their oil with the warmed garlic, lemon juice, two-thirds of the pine nuts, balsamic, water and seasoning to a slightly chunky sauce, adding water to loosen.\nCook the diced garlic in a frying pan with olive oil and salt for a minute, halve the cherry tomatoes and add them, blistering on high heat 2-3 minutes. Stir through the drained pasta with the sun-dried tomato sauce and spinach and cook a final few minutes until the spinach wilts.\nServe with lots of pepper and the remaining toasted pine nuts on top.", "source": "", "notes": "Serves 4. Nut free with sunflower seeds.", "favorite": false, "createdAt": 1782000000021, "categories": ["Pastas", "Vegan/Vegetarian"]}, {"id": "r23", "title": "Creamy Korma", "ingredients": "1 large sweet potato (about 400g)\n1/2 butternut squash (about 500g)\n2 carrots (about 150g)\n3 tbsp vegetable oil\n2 large white onions\n2 green cardamom pods\n3 cloves\n1 bay leaf\n50g cashew nuts\n75g blanched almonds\n2cm piece fresh ginger\n2 fresh green chillies\n3 garlic cloves\n1/2 tsp ground turmeric\n1/2 tsp ground nutmeg\n1 x 400ml tin coconut milk\n2 limes\nsmall bunch of fresh coriander, to serve\n2 spring onions, to serve\nrice, to serve, optional\nsalt", "method": "Preheat oven to 180C and line a baking tray. Peel the sweet potato, squash and carrots, cut into 2cm chunks, arrange on the tray, drizzle with 1 tbsp oil and season. Roast 30 minutes, turning, until softened and a little brown. Peel and finely slice the onions.\nBash the cardamom pods open and tip the seeds into a large frying pan with the cloves over medium-high heat. Toast 2 minutes.\nReduce to medium-low, add the remaining 2 tbsp oil, the onions, bay leaf, cashews and 50g of the almonds. Cook 12 minutes, stirring regularly, until the onions are soft and the nuts slightly golden.\nAdd the chopped ginger, deseeded chopped chillies, crushed garlic, nutmeg and turmeric and cook another 2 minutes. Cool 5 minutes, remove the bay leaf, then blend with 200ml of the coconut milk to a smooth paste. Return to the pan over medium heat.\nAdd the roasted vegetables, pour in the rest of the coconut milk and stir gently until mixed. Simmer about 5 minutes, adding a splash of water if too thick.\nSqueeze over the lime juice and season with salt. Serve with rice if using, scattered with coriander, the remaining chopped almonds and sliced spring onions.", "source": "", "notes": "Serves 4-6. Serve with rice or naan.", "favorite": false, "createdAt": 1782000000022, "categories": ["Curries", "Vegan/Vegetarian"]}, {"id": "r24", "title": "Quick Chickpea Braise with Kale & Harissa", "ingredients": "olive oil\n1 red onion, peeled and thinly sliced\n2 cloves of garlic, peeled and thinly sliced\n2 big handfuls of kale (about 200g), leaves roughly chopped, stems shredded\n1 heaped teaspoon ground turmeric\n1 preserved lemon\n1 x 400g tin chopped tomatoes\n2 x 400g tins chickpeas or a 660g jar\na bunch of flat-leaf parsley, roughly chopped\n\nTo serve\n4 tablespoons plain yoghurt of your choice\n1 tablespoon harissa\ntahini, for drizzling\n4 flatbreads", "method": "Put a little oil in a large frying pan, add the onion and cook over medium heat for 5 minutes.\nAdd the garlic, kale stems (leaves go in later) and turmeric and cook for a couple of minutes.\nCut the preserved lemon in half, discard the flesh and finely chop the peel. Add to the pan with the tomatoes and the chickpeas including their liquid (add 150ml water if using jarred). Cook about 10 minutes until the tomatoes thicken. Add the reserved kale leaves and cook a few minutes until wilted. Season to taste and stir in most of the parsley.\nRipple the yoghurt and harissa together and serve with the braise, a drizzle of tahini, the last of the parsley and warm flatbreads.", "source": "", "notes": "Serves 4. One-Pan. Lemon zest works if you have no preserved lemon.", "favorite": false, "createdAt": 1782000000023, "categories": ["Vegan/Vegetarian"]}, {"id": "r25", "title": "Creamy Lentils, Mushrooms & Mustard", "ingredients": "olive oil\n1 onion, finely diced\n3 garlic cloves, finely diced\n2 carrots, finely diced\n2 celery stalks, finely diced\n200g cherry tomatoes, quartered\n2 tablespoons apple cider vinegar\n200g dried green lentils\n1 vegetable stock cube\n600ml boiling water\n1 tablespoon dried thyme\n6 large Portobello mushrooms, sliced\n250g chestnut mushrooms, halved or quartered\n3 tablespoons Dijon mustard\n5 heaped tablespoons plain yoghurt (we use coconut yoghurt)\n2 large handfuls of spinach (about 100g)\nsalt and pepper\n\nTo serve\nlarge handful of parsley, chopped\ncrusty sourdough bread or toast", "method": "Place a large saucepan over medium heat with a drizzle of olive oil. Add the onion, garlic, carrots, celery and a good sprinkling of salt. Cook 5-10 minutes until softened.\nAdd the cherry tomatoes and apple cider vinegar, then stir in the lentils and cook 1 minute. Dissolve the stock cube in the boiling water and pour in. Cook over low heat about 25-35 minutes until the lentils are soft, topping up with water if needed.\nIn a large frying pan over medium-high heat, add olive oil, the thyme and salt. Cook the mushrooms 5-10 minutes until tender, then stir in 2 tablespoons each of the mustard and yoghurt.\nAdd the spinach to the lentils to wilt, then stir in the remaining yoghurt and mustard.\nServe the lentils topped with the mushrooms, parsley and lots of pepper, with sourdough toast on the side.", "source": "", "notes": "Nut free. Serves 4. Big Batch. Lentils vary in cooking time.", "favorite": false, "createdAt": 1782000000024, "categories": ["Vegan/Vegetarian"]}, {"id": "r26", "title": "Lemon, Asparagus & Giant Couscous Traybake", "ingredients": "200g giant (Jerusalem) couscous\n400g asparagus, halved lengthways\n1 head of spring greens (about 150-200g)\n2 unwaxed lemons\na generous pinch of dried chilli flakes (or 1 tsp Turkish chilli flakes)\n2 cloves of garlic, peeled and thinly sliced\nolive oil\n200g block of halloumi (or vegan halloumi-style), broken into small pieces\na bunch of dill or mint, chopped\n1 teaspoon sumac", "method": "Cook the giant couscous in boiling salted water until al dente (a couple of minutes less than the packet says).\nPreheat your grill to high. Snap the woody bottoms off the asparagus. Roughly shred the spring greens. Put both on a roasting tray, grate over the zest of both lemons and sprinkle with the chilli flakes and garlic. Cut the zested lemons into thin slices.\nAdd the cooked couscous to the tray and toss with a generous amount of olive oil. Season, then lay the halloumi and lemon slices on top.\nGrill for 10 minutes, turning from time to time, until the asparagus loses its rawness and the halloumi browns.\nFinish with the chopped dill, a drizzle of oil and a sprinkle of sumac, and serve right away.", "source": "", "notes": "Serves 4. Cooked entirely under the grill.", "favorite": false, "createdAt": 1782000000025, "categories": ["Vegan/Vegetarian"]}, {"id": "r27", "title": "Green Minestrone with Pesto", "ingredients": "2 tbsp olive oil\n1 tbsp fresh sage leaves, finely chopped\n2 garlic cloves, finely chopped\n1 medium leek, finely chopped\n2 celery stalks, trimmed, thinly sliced\n3 cups curly kale, stems discarded, torn\n6 cups vegetable stock\n150g green beans, trimmed, cut into 2.5cm pieces\n1 medium zucchini, halved lengthways, thinly sliced\n1 x 425g can cannellini or Great Northern beans, drained, rinsed\nsalt and freshly ground black pepper\n\nPesto\n2 cups fresh basil leaves\n1/2 cup finely grated Parmesan cheese\n1/4 cup pine nuts, toasted\n1/2 garlic clove, peeled\n1/2 cup olive oil", "method": "Heat the olive oil in a large saucepan over medium heat. Cook the sage, garlic and leek, stirring, for 3 minutes until the leek is soft. Add the celery and kale; cook, stirring, 2 minutes until the kale is bright green. Add the stock, bring to the boil, reduce heat and simmer 5 minutes.\nAdd the green beans, zucchini and cannellini beans; cook 5 minutes until the green beans are tender. Season.\nMeanwhile make the pesto: pulse all the ingredients in a food processor until smooth; season.\nLadle the soup into bowls and serve topped with the pesto.", "source": "", "notes": "Vegetarian. Serves 4. Soup keeps a day ahead; pesto keeps 3 days covered with a little oil.", "favorite": false, "createdAt": 1782000000026, "categories": ["Soups", "Vegan/Vegetarian"]}, {"id": "r28", "title": "Black Dal (Maa ki Dal)", "ingredients": "350g whole urid (sabut urid / small black beans)\n1/2 tsp Kashmiri chilli powder\n50ml mustard oil or vegetable oil\n3 Indian bay leaves (optional)\n6cm piece of cinnamon stick\n1 medium red onion, chopped\n300g tomatoes, roughly chopped\n1 1/2 tsp toasted ground cumin seeds\n1 1/2 tsp turmeric\n1 1/2 tsp ground coriander\n1 1/2 tsp garam masala\n1/4 tsp asafoetida (optional)\n2 tsp salt\n\nTo finish\n25g butter or ghee\n20g/4cm ginger, finely shredded\nhandful of fresh coriander, roughly chopped\n\nTo serve\nIndian breads or boiled basmati rice", "method": "Wash the beans, then cover with fresh water by 4cm and soak overnight. Next day, put the beans and their soaking water in a large pan with the chilli powder and 2 teaspoons of the mustard oil. Bring to a simmer, cover and cook over low heat for 1.5-2 hours, topping up with water when needed, until completely tender.\nMeanwhile, heat the remaining oil in a frying pan over medium heat, add the bay leaves (if using) and cinnamon and fry 1 minute, then add the onion and fry 10 minutes until golden. Stir in the tomatoes, spices and salt and simmer 10 minutes until reduced slightly.\nAdd the tomato mixture to the cooked beans and simmer 15 minutes. Stir in the butter, finish with the shredded ginger and chopped coriander and serve with Indian breads or rice.", "source": "", "notes": "Serves 6-8. Rick Stein - 'Sahel/India'.", "favorite": false, "createdAt": 1782000000027, "categories": ["Curries", "Vegan/Vegetarian"]}, {"id": "r29", "title": "Barbecued Corn & Roasted Butternut with Black Beans and Jalapeno Sour Cream", "ingredients": "1 butternut pumpkin (about 1 kg), peeled and cut into 2 cm cubes\n3 tablespoons extra-virgin olive oil\n4 corn cobs, husks removed\n1 teaspoon paprika\n380g cooked black beans (about 2 cans), drained\n1/2 cup pumpkin seeds, toasted\n1/2 cup coriander leaves\n50 g manchego cheese, shaved\n1 lime, cut into cheeks\nsea salt and black pepper\n\nCumin vinaigrette\n1 garlic clove, grated\n1 teaspoon dijon mustard\n2 teaspoons white wine vinegar\n2 teaspoons ground cumin\n100 ml extra-virgin olive oil\n1/4 cup coriander leaves, finely chopped\n\nJalapeno sour cream\n300 g sour cream\n1 jalapeno chilli, deseeded and finely chopped", "method": "Preheat the oven to 200C.\nPlace the pumpkin on a large baking tray, coat in 1-3 tablespoons of the olive oil and season. Bake 25-30 minutes until tender; cool slightly.\nHeat a chargrill pan or barbecue to high. Drizzle the remaining oil over the corn and char, turning every minute or so, until blackened on all sides. Cut the kernels off, toss with the paprika and season.\nMake the cumin vinaigrette by whisking all the ingredients together.\nMake the jalapeno sour cream by combining the ingredients.\nCombine the pumpkin, black beans and corn and toss with the vinaigrette. Spoon onto a platter, top with dollops of jalapeno sour cream and scatter over pumpkin seeds, coriander and shaved manchego. Serve with lime cheeks.", "source": "", "notes": "Serves 4-6. Substitute sweet potato for the butternut if you prefer.", "favorite": false, "createdAt": 1782000000028, "categories": ["Mexican", "Vegan/Vegetarian"]}, {"id": "r30", "title": "Sauteed Prawns & Courgettes with Salted Lemon, Coriander and Basil", "ingredients": "50ml olive oil\n5 banana shallots, thinly sliced\n20g/4 cloves garlic, finely chopped\n20g/4cm ginger, finely shredded\n250g large peeled raw prawns\n1 medium courgette (about 150g), thinly sliced\n30g pickled lemon, thinly sliced\n1/2 tsp finely chopped thyme leaves\n1/2 tsp finely chopped rosemary leaves\n1/2 tsp Kashmiri chilli powder\n1/2 tsp garam masala\n1/2 tsp ground black pepper\n1 tsp salt\nsmall handful each of fresh coriander, curry and basil leaves", "method": "Heat the olive oil in a heavy-based saucepan or karahi over medium heat. Add the shallots, garlic and ginger and fry for 5 minutes until softened. Increase the heat to medium-high and stir in the prawns, courgette and pickled lemon. Fry for 1-2 minutes, then add the thyme, rosemary, chilli powder, garam masala, black pepper and salt and fry a further 2-3 minutes, stirring often, until the prawns are pink and cooked through.\nStir through the coriander, curry and basil leaves and serve.", "source": "", "notes": "Serves 2-4. An Indian-French (Creole) fusion dish.", "favorite": false, "createdAt": 1782000000029, "categories": ["Fish"]}, {"id": "r31", "title": "Corn Fritters with Smoky Baked Beans and Avo Smash", "ingredients": "FOR THE FRITTERS\n1 x 300g tin sweetcorn, drained\n100g spinach\n2 tablespoons buckwheat flour\n2 tablespoons plain flour\n1 teaspoon bicarbonate of soda\n1 teaspoon smoky paprika\n2 tablespoons plain yoghurt (or coconut yoghurt)\n140ml almond milk\n1 red chilli, deseeded and sliced\nhandful of coriander or chives, chopped\nsalt and pepper\n\nFOR THE SMOKY BAKED BEANS\nolive oil\n1 onion, chopped\n2 garlic cloves, chopped\n1 teaspoon ground cumin\n1 teaspoon smoked paprika\n1 teaspoon chilli powder\n1 tablespoon tamari\n1 teaspoon apple cider vinegar\n2 x 400g tins beans (e.g. red kidney beans, drained)\n1 tablespoon tomato puree\n28g parsley, chopped\n\nFOR THE AVO SMASH\n2 large ripe avocados, peeled and stoned\njuice of 1 lime\npinch of chilli flakes\nhandful of coriander, roughly chopped\n70g sun-dried tomatoes, roughly chopped", "method": "Start with the beans: place a pan over medium heat with olive oil. Add the onion and garlic and cook 5-10 minutes until soft. Add the spices and cook a minute, stirring, then add the tamari, vinegar, tomato puree, beans (and a little tinned tomato/maple syrup to taste). Bring to the boil, then simmer 15-20 minutes until thickened. Stir through the parsley and seasoning and keep warm.\nFor the smash, mash the avocado with the lime juice, chilli, olive oil and salt. Stir through the coriander and sun-dried tomatoes.\nFor the fritters, blitz two-thirds of the sweetcorn until smooth. Mix the flours, bicarb and salt, then stir in the yoghurt, blitzed sweetcorn and almond milk to a smooth batter. Stir through the chilli, herbs, spinach and remaining whole kernels.\nHeat a frying pan over medium with olive oil. Spoon in tablespoons of batter and cook 3-5 minutes until golden, then flip and cook the other side. Serve with the beans and avo smash.", "source": "", "notes": "Serves 4. Beans keep ~5 days in the fridge and freeze well. (Some method wording was inferred from a partly obscured photo.)", "favorite": false, "createdAt": 1782000000030, "categories": ["Breakfast", "Vegan/Vegetarian"]}, {"id": "r32", "title": "Super Veggie Fried Rice", "ingredients": "4 tablespoons sesame oil\n1 red onion, finely chopped\n3 spring onions, finely chopped\n2 garlic cloves, finely chopped\n2 teaspoons ground turmeric\n400g firm tofu, cut into 1cm cubes\n200g frozen peas\n2 red peppers, cut into 1cm cubes\n2 large handfuls of spinach (about 100g)\n2 tablespoons tamari\n500g cooked rice (brown basmati; cook 175g if no leftovers)\nsalt and pepper\nsriracha or hot sauce, to serve", "method": "Place a large frying pan over medium heat and add the sesame oil. Add the red and spring onions, garlic, turmeric and lots of seasoning. Cook a couple of minutes, then add the tofu and mix well to coat in the turmeric.\nAdd the peas, peppers, spinach, tamari and rice and cook another couple of minutes, making sure the rice is piping hot throughout. Serve with sriracha.", "source": "", "notes": "Nut free. Serves 4. Only reheat cooked rice once, until piping hot.", "favorite": false, "createdAt": 1782000000031, "categories": ["Stir Fry", "Vegan/Vegetarian"]}, {"id": "r33", "title": "Green Thai Curry", "ingredients": "For the curry paste\n1/2 large onion, roughly chopped\n1 red chilli, roughly chopped\n1 garlic clove, roughly chopped\n1 lemongrass stalk, bashed and roughly chopped\n1 thumb-sized piece of ginger, peeled and roughly chopped\nhandful of coriander (about 20g)\n1 teaspoon ground cumin\n1 lime leaf\n3 1/2 tablespoons coconut oil\n\nFor the curry\n2 red peppers, deseeded and cut into bite-sized chunks\n2 courgettes, halved lengthways and diced into chunky half moons\nolive oil\n1 tablespoon coconut oil\n2 x 400g tins of coconut milk\n1 tablespoon tamari\nhandful of mangetout (about 50g)\nhandful of fresh coriander, chopped\nsalt", "method": "Preheat the oven to 240C (fan 220C).\nBlitz all the paste ingredients in a food processor until smooth.\nPlace the peppers and courgettes in a baking tray with salt and a drizzle of olive oil. Roast 10 minutes until they lose their raw look but keep a slight crunch; set aside.\nHeat the coconut oil in a heavy-based pan over medium heat. Add the curry paste and cook 5 minutes until soft. Add the coconut milk and tamari, bring to the boil, then simmer 5 minutes. Blitz with a hand blender and pass through a sieve if needed. Return to low heat, add the roasted vegetables and mangetout and cook a final 5 minutes (don't overcook).\nSprinkle with chopped coriander to serve.", "source": "", "notes": "Serves 4. Use thick, creamy coconut milk and mix well before using.", "favorite": false, "createdAt": 1782000000032, "categories": ["Curries", "Vegan/Vegetarian"]}, {"id": "r34", "title": "Braised Chicken with Chickpeas, Lemon and Garlic", "ingredients": "1 tablespoon olive oil\n2 medium brown onions (300g), sliced thickly\n2 teaspoons smoked paprika\n3 cloves garlic, crushed\n8 chicken thigh cutlets, skin removed (1.6kg)\n3 cups (750ml) salt-reduced chicken stock\n1/4 cup (60ml) lemon juice\n2 fresh long red chillies, halved lengthways\n800g canned chickpeas, rinsed and drained\n2 teaspoons dijon mustard\n1/2 cup coarsely chopped fresh flat-leaf parsley\n2 teaspoons finely grated lemon rind", "method": "Heat oil in a large saucepan; cook onion, stirring, until softened. Add paprika, garlic and chicken; stir to coat the chicken in the onion mixture.\nAdd stock, lemon juice, chilli, chickpeas and mustard; bring to the boil. Reduce heat; simmer, covered, 30 minutes. Uncover; simmer a further 30 minutes or until the chicken is tender. Season to taste.\nServe chicken sprinkled with parsley and lemon rind.", "source": "", "notes": "Poultry. Serves 4.", "favorite": false, "createdAt": 1782000000033, "categories": ["Meat/Poultry"]}, {"id": "r35", "title": "Coriander and Chilli Grilled Chicken", "ingredients": "6 chicken thigh fillets (1.2kg), halved\n\nCoriander chilli sauce\n8 green onions (scallions), chopped coarsely\n3 cloves garlic, quartered\n3 fresh small red Thai chillies, chopped coarsely\n1/4 cup loosely packed fresh coriander leaves\n1 teaspoon white sugar\n1/4 cup (60ml) lime juice\n\nChickpea salad\n600g canned chickpeas, rinsed and drained\n2 medium plum tomatoes (150g), chopped coarsely\n2 green onions (scallions), chopped finely\n2 tablespoons lime juice\n1 cup coarsely chopped fresh coriander\n1 tablespoon olive oil", "method": "Make the coriander chilli sauce: blend or process the onion, garlic, chilli, coriander and sugar until finely chopped. Add the lime juice; blend until well combined. Season to taste.\nCook the chicken on a heated oiled grill plate (or barbecue) until almost cooked through. Brush about two-thirds of the sauce all over the chicken; cook a further 5 minutes or until cooked through.\nMake the chickpea salad: combine the ingredients in a large bowl.\nSprinkle the chicken with the remaining sauce and serve with the chickpea salad.", "source": "", "notes": "Poultry. Serves 4.", "favorite": false, "createdAt": 1782000000034, "categories": ["Meat/Poultry"]}, {"id": "r36", "title": "Miso Broth with Tamari Pumpkin and Noodles", "ingredients": "1/3 cup (80g) red miso\n1/4 cup (60ml) tamari\n1 tablespoon olive oil\n600g butternut pumpkin, cut into 2.5cm thick wedges\n1.5 litres (6 cups) water\n40g piece fresh ginger, cut into matchsticks\n140g dried soba noodles\n250g gai lan (Chinese broccoli), trimmed\n1/4 cup shredded dried seaweed (nori)\n2 green onions (scallions), sliced thinly\n2 tablespoons toasted sesame seeds", "method": "Preheat oven to 200C/400F. Line an oven tray with baking paper.\nWhisk 1 tablespoon miso, 2 tablespoons tamari and the oil in a large bowl; toss the pumpkin to coat. Place in a single layer on the tray and roast 40 minutes until golden and tender.\nMeanwhile, bring the water, ginger and remaining miso to the boil in a large saucepan. Add the noodles and gai lan; return to the boil. Reduce heat and simmer 2 minutes until the noodles are tender. Stir in the remaining tamari; season.\nDivide the pumpkin and broth into bowls; sprinkle with seaweed, green onion and sesame seeds.", "source": "", "notes": "Vegan. Serves 4. Optional: sprinkle with shichimi togarashi or chilli flakes.", "favorite": false, "createdAt": 1782000000035, "categories": ["Soups", "Vegan/Vegetarian"]}, {"id": "r37", "title": "Za'atar Fish with Bulgur Salad", "ingredients": "1 tbsp olive oil\n1 1/2 tbsp za'atar\n4 x 180g boneless white fish fillets\nsalt and freshly ground black pepper\n\nBulgur salad\n1 medium red onion, thinly sliced\n1 cup fresh Italian parsley\n1 tbsp fresh thyme leaves\n4 roma tomatoes, roughly chopped\n1/2 cup radishes, thinly sliced\n2 cups arugula\n1/4 cup bulgur\n1 tsp ground sumac\n2 tbsp lemon juice\n1/4 cup olive oil", "method": "Make the bulgur salad: combine the ingredients in a bowl; season. Let stand until the bulgur softens.\nCombine the olive oil, za'atar and fish in a large bowl; season. Cook the fish in a skillet or on a grill over medium-high heat for a few minutes each side, or until browned and cooked through.\nServe the fish with the bulgur salad.", "source": "", "notes": "Pescatarian. Serves 4 (plus standing time). Great with sea bass, branzino, trout, tilapia or salmon.", "favorite": false, "createdAt": 1782000000036, "categories": ["Fish", "Salad"]}, {"id": "r38", "title": "Super Creamy Turmeric Pasta", "ingredients": "4 portions of pasta (about 80g per person)\n200g frozen peas\n1 onion, finely diced\n2 garlic cloves, finely diced\n100g cashews\n200ml oat milk (unsweetened)\n4 tablespoons nutritional yeast\n1 teaspoon ground turmeric\n1/2 teaspoon brown rice miso paste\npinch of chilli flakes\nsqueeze of lemon juice\nsalt and pepper\nsprinkling of coriander, to serve", "method": "Cook the pasta per packet, adding the peas for the last few minutes. Drain and set aside.\nWhile the pasta cooks, warm a frying pan over medium heat with olive oil and salt, then add the onion and garlic and cook 5 minutes until soft.\nSoak the cashews in a bowl of boiling water until the onions are cooked.\nDrain the cashews and blend with all the remaining ingredients, including the onion and garlic, until smooth and creamy. Stir the sauce through the pasta and peas before serving.", "source": "", "notes": "Serves 4.", "favorite": false, "createdAt": 1782000000037, "categories": ["Pastas", "Vegan/Vegetarian"]}, {"id": "r39", "title": "Bangin' Bolognese", "ingredients": "1 garlic clove\n2 onions\n1 x 400g tin green lentils\n10g fresh thyme or 4g dried thyme\n50g walnuts\n1 tbsp olive oil\n1 x 400g tin chopped tomatoes\n1 tbsp tomato puree\n50ml red wine\n1/2 tsp chilli flakes\n1 1/2 tsp dried oregano\n1 tsp balsamic vinegar\n1/2 tsp yeast extract (e.g. Marmite)\n100ml water\n320g wholewheat spaghetti\nsalt and black pepper\n\nTo serve\n20g vegan hard cheese, optional\n10g fresh parsley leaves\n200g green salad", "method": "Peel and grate the garlic. Peel and finely chop the onions. Drain and rinse the lentils. Pick and roughly chop the thyme. Blitz the walnuts until coarsely ground.\nHeat the olive oil in a large frying pan over medium heat. Add the onions and a pinch of salt and cook 4-5 minutes until softened. Add the garlic and cook a further minute. Add the walnuts, lentils, tomatoes, tomato puree, red wine, chilli flakes, oregano, thyme, balsamic, yeast extract and water. Simmer 15-20 minutes, stirring regularly; it darkens as it cooks. Season to taste.\nWhile the ragu simmers, cook the spaghetti in salted boiling water until al dente. Reserve a little pasta water, then drain. Add the spaghetti and a splash of pasta water to the ragu and stir through.\nPlate up, garnish with parsley (and grated hard cheese if using) and serve with green salad.", "source": "", "notes": "Serves 4. ~492 kcal.", "favorite": false, "createdAt": 1782000000038, "categories": ["Pastas", "Vegan/Vegetarian"]}, {"id": "r40", "title": "Spicy Szechuan-Style Shiitake Stir-Fry", "ingredients": "300g shiitake mushrooms\n200g green beans\n100g baby corn\n100g Tenderstem broccoli\n2.5cm piece fresh ginger\n1 garlic clove\n2 spring onions\n1 fresh red chilli\n2 tsp vegetable oil\n1 tsp sesame oil\n2 x 250g bags microwavable brown basmati rice\n2 tbsp white sesame seeds\n\nFor the Szechuan-style sauce\n2 tbsp maple syrup\n2 tbsp soy sauce\n1 tbsp sriracha\n1 1/2 tbsp rice wine vinegar\n1/2 tsp Chinese five-spice\n1 tsp chilli flakes", "method": "Make the sauce: combine the maple syrup, soy sauce, sriracha, rice wine vinegar, five-spice and chilli flakes in a bowl and stir.\nRoughly chop the mushrooms. Trim and halve the green beans. Halve the baby corn. Trim and chop the broccoli stalks into thirds. Peel and finely grate the ginger. Peel and finely chop the garlic. Thinly slice the spring onions. Slice the chilli.\nHeat the vegetable oil in a wok over high heat. Add the ginger and garlic and stir 30 seconds. Add the shiitake and stir-fry 1 minute. Add the green beans, baby corn and broccoli and stir-fry 1 minute. Add the sauce and stir 1 minute until the vegetables are cooked, loosening with a splash of water if needed. Drizzle over the sesame oil and stir.\nCook the rice per packet and stir half the spring onions through it. Serve the rice topped with the stir-fry, garnished with the remaining spring onions, sliced chilli and sesame seeds.", "source": "", "notes": "Serves 4. Handwritten note: use half the sriracha and half the chilli flakes for less heat.", "favorite": false, "createdAt": 1782000000039, "categories": ["Stir Fry", "Vegan/Vegetarian"]}, {"id": "r41", "title": "Sri Lankan Curry", "ingredients": "1 large sweet potato, peeled and cut into bite-sized chunks (no bigger than 2.5cm)\n1/2 butternut squash, peeled and cut into bite-sized chunks\n3 tablespoons coconut oil\n1/2 teaspoon ground turmeric\n1/2 teaspoon ground cinnamon\n1/2 teaspoon chilli powder\n1 teaspoon medium curry powder\n2 red peppers, deseeded and sliced\n1 teaspoon cumin seeds\n1 teaspoon black mustard seeds\n1 large red onion, finely sliced\n3 garlic cloves, finely sliced\n2 green chillies, deseeded and finely sliced\n1 x 400g tin of coconut milk\n1 tablespoon coconut sugar or maple syrup\njuice of 1/2 lime\n100g baby spinach\nsalt", "method": "Preheat the oven to 240C (fan 220C).\nPlace the sweet potato and squash in a baking tray with salt, 2 tablespoons of the coconut oil, the turmeric, cinnamon, chilli powder and curry powder. Roast 30-35 minutes until soft, adding the sliced pepper for the last 10 minutes. Set aside.\nMeanwhile, heat the remaining coconut oil in a heavy-based pan over medium heat. Add the cumin and black mustard seeds and cook 30 seconds until they pop.\nAdd the onion, garlic and chilli and cook 5 minutes, then add the coconut milk and coconut sugar. Cook a further 15 minutes, adding the lime juice in the last 5 minutes.\nAdd the roasted squash, sweet potato and peppers and cook 5 more minutes, stirring so it doesn't stick.\nStir through the spinach and leave to wilt before serving.", "source": "", "notes": "Serves 4. Freezes well; cook from frozen at 200C (fan 180C) for 20-25 min. Green beans also work in place of the spinach.", "favorite": false, "createdAt": 1782000000040, "categories": ["Curries", "Vegan/Vegetarian"]}, {"id": "r42", "title": "Late Summer Corn & Tomato Curry", "ingredients": "2 teaspoons fennel seeds\n2 teaspoons coriander seeds\n2 teaspoons black mustard seeds\ncoconut or groundnut oil\n2 leeks, washed and roughly shredded\n4 cloves of garlic, peeled and chopped\n1 green chilli, roughly chopped\n1 x 400ml tin coconut milk\n2 tablespoons tamarind paste\n1kg tomatoes (small halved, big quartered), or 2 x 400g tins cherry tomatoes\nkernels from 1 large corn on the cob (or 175g tinned/frozen)\n2 large handfuls of chard or spinach, leaves shredded, stems sliced\n\nTo serve\nlime-spiked yoghurt (plain yoghurt mixed with lime juice and zest)\nrice\nwarm rotis or chapatis", "method": "Grind the fennel and coriander seeds to a rough powder. Put your largest frying pan or wok over medium heat, add the ground spices and mustard seeds and toast for a couple of minutes, then tip into a bowl.\nAdd a little oil to the pan with the leeks and a pinch of salt, and cook 10 minutes until soft and sweet. Stir the toasted spices back in.\nAdd the garlic and chilli and stir around for about 5 minutes. Pour in the coconut milk, add the tamarind, tumble in the tomatoes and cook 20 minutes on medium-high until the tomatoes lose liquid and the coconut milk thickens.\nAdd the corn and greens and cook a couple of minutes until the greens wilt. Serve with lime-spiked yoghurt and rice, or rotis/chapatis.", "source": "", "notes": "Serves 4. One Pot. In winter use tinned cherry tomatoes, frozen corn and thinly sliced squash.", "favorite": false, "createdAt": 1782000000041, "categories": ["Curries", "Vegan/Vegetarian"]}, {"id": "r43", "title": "Chargrilled Broccoli with Chickpeas, Almonds, Lemon and Chilli", "ingredients": "2 broccoli heads (about 1 kg), cut into florets\n125 ml (1/2 cup) extra-virgin olive oil\n1/3 cup capers, rinsed and drained\n2 garlic cloves, finely chopped\n1 long red chilli, finely sliced\n500 g cooked chickpeas (about 2 cans), drained\n1 cup baby spinach leaves\ngrated zest and juice of 1 lemon\n1 cup flat-leaf parsley leaves, finely chopped\n1 cup mint leaves\n80 g parmesan, shaved\n1/2 cup flaked almonds, toasted\nsea salt and black pepper", "method": "Toss the broccoli in half of the olive oil and season generously.\nHeat a chargrill pan or barbecue until smoking hot and add the broccoli in batches, turning so the florets get char marks all over. Set the cooked broccoli aside in a bowl.\nPut the rest of the oil in a small saucepan with the capers, garlic and chilli over medium heat for 30 seconds or so until the garlic just turns golden. Take off the heat immediately and pour over the broccoli.\nCombine the broccoli with the chickpeas, spinach and lemon zest, season and mix well. To serve, squeeze over the lemon juice and top with the parsley, mint, parmesan and almonds.", "source": "", "notes": "Serves 4-6. From 'Everybody Loves Brassicas'.", "favorite": false, "createdAt": 1782000000042, "categories": ["Salad", "Vegan/Vegetarian"]}, {"id": "r44", "title": "The Best-Dressed BOSH! Bowl", "ingredients": "1 onion\n4 garlic cloves\n1 fresh red chilli\n4 tbsp fennel seeds\n4 tbsp olive oil\n4 tbsp balsamic vinegar, plus extra for drizzling\n1 tbsp maple syrup\n3 tbsp tomato puree\n250g pre-cooked puy lentils\n350g butternut squash\n1 fennel bulb\n200g cherry tomatoes\n1 yellow pepper\n1 red pepper\n1 courgette\n1 avocado\n100g baby leaf spinach or kale\n10g fresh flat-leaf parsley leaves\nsalt and black pepper", "method": "Preheat oven to 180C. Peel the onion and garlic, deseed the chilli, and finely chop the onion, garlic, chilli and fennel seeds. Spoon into a medium saucepan with the olive oil, balsamic, maple syrup and tomato puree. Stir over medium heat for 5 minutes, then add the cooked lentils. Stir through, remove from the heat and set aside.\nPeel and deseed the squash and cut into 2cm chunks. Tip into a roasting tray, drizzle with oil, season and roast for 15 minutes.\nMeanwhile, trim and core the fennel and cut into 1cm wedges. Halve the tomatoes. Deseed the peppers and trim the courgette; cut the peppers and courgette into 1cm pieces. Add the fennel, courgettes, peppers and tomatoes to the tray with the squash, drizzle with a little more oil and roast a further 15 minutes until tender.\nStone and chunk the avocado. Wash and lightly chop the spinach or kale and roughly chop the parsley.\nTip the roasted veg into a serving bowl with the avocado, greens, parsley and lentils. Stir and serve.", "source": "", "notes": "Serves 3-6.", "favorite": false, "createdAt": 1782000000043, "categories": ["Salad", "Vegan/Vegetarian"]}, {"id": "r45", "title": "Fennel and Aubergine Curry", "ingredients": "1 large aubergine, cut into bite-sized chunks\nolive oil\n1 fennel bulb, cut into bite-sized chunks\n1 onion, finely sliced\n3 garlic cloves, finely sliced\n1 red chilli, finely sliced\n1 tablespoon ground ginger\n2 x 400g tins of tomatoes\n1 teaspoon garam masala\nsalt and pepper", "method": "Preheat the oven to 240C (fan 220C).\nPlace the aubergine in a baking tray with a little olive oil and seasoning. Roast 35-40 minutes until golden, adding the fennel for the last 10-15 minutes.\nWhile the aubergine and fennel cook, place the onion, garlic, chilli and ginger in a heavy-based pan with a drizzle of olive oil and a pinch of salt. Cook over medium heat for 5-10 minutes until soft.\nAdd the garam masala and cook a further 5 minutes, then add the tinned tomatoes, fennel and aubergine. Bring to the boil, then simmer for 30-35 minutes until really soft, adding water if it gets too thick.", "source": "", "notes": "Serves 4. A simple 8-ingredient dish with very little prep.", "favorite": false, "createdAt": 1782000000044, "categories": ["Curries", "Vegan/Vegetarian"]}, {"id": "r46", "title": "Aromatic Lamb Curry", "ingredients": "400g lamb shoulder, bone out\n2 large onions\n2 large aubergines (800g total)\n2 tablespoons rogan josh curry paste\n200g natural yoghurt\n1 tablespoon red wine vinegar\nextra virgin olive oil\nsea salt and black pepper", "method": "Preheat the oven to 180C/350F/gas 4. Put a large shallow casserole pan on a high heat. Dice the lamb into 3cm chunks and place in the pan fat side down. Peel the onions and dice with the aubergines to the same size as the lamb, then stir into the pan. Season, stir in the curry paste and the red wine vinegar, then transfer to the oven for 1 hour, or until tender, stirring halfway and loosening with a splash of water if needed.\nTaste and season, ripple through the yoghurt, drizzle over 1/2 tablespoon extra virgin olive oil, add lots of black pepper, and serve.", "source": "", "notes": "Serves 4. Jamie Oliver - 5 ingredients. Prep 10 min, cook 1 hour.", "favorite": false, "createdAt": 1782000000045, "categories": ["Curries", "Meat/Poultry"]}, {"id": "r47", "title": "Spaghetti Bolognese", "categories": ["Pastas", "Meat/Poultry"], "ingredients": "1 1/2 tbsp olive oil\n2 garlic cloves, minced\n1 onion, finely chopped\n500g beef mince (or half pork, half beef)\n1/2 cup (125 ml) dry red wine (sub water or beef stock)\n2 beef bouillon cubes, crumbled\n800g can crushed tomato (or passata)\n2 tbsp tomato paste\n2 tsp white sugar, if needed\n2 tsp Worcestershire sauce\n2 dried bay leaves\n2 sprigs fresh thyme (or 1/2 tsp dried thyme or oregano)\n3/4 tsp cooking salt\n1/2 tsp black pepper\n400g spaghetti, dried\nParmesan cheese and finely chopped parsley (optional)", "method": "Heat oil in a large pot over medium-high heat. Add onion and garlic and cook for 3 minutes until light golden and softened.\nTurn heat to high and add the beef. Cook, breaking it up, until browned.\nAdd the red wine. Bring to a simmer and cook 1 minute, scraping the pot, until the alcohol smell is gone.\nAdd all the remaining ingredients (except pasta and garnish). Stir, bring to a simmer, then reduce to medium and cook 20-30 minutes uncovered, adding water if it thickens too much. Stir occasionally. (Slow option: add 3/4 cup water, cover and simmer very low 2-2.5 hours, then uncover and si
