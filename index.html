mmer 20 minutes to thicken.)\nTaste and adjust salt. Cook the spaghetti per packet minus 1 minute, reserving a mug of pasta water. Add the drained pasta to the sauce with about 1/2 cup pasta water over medium heat and toss 1.5-2 minutes until the sauce thickens and coats.\nDivide between bowls and garnish with parmesan and parsley.", "source": "https://www.recipetineats.com/spaghetti-bolognese/", "notes": "Serves 5. Prep 10 min, cook 30 min. RecipeTin Eats.", "favorite": false, "createdAt": 1782000100000}, {"id": "r48", "title": "Beef Ragu", "categories": ["Pastas", "Meat/Poultry"], "ingredients": "3 pounds beef chuck roast, cut into large pieces\nkosher salt and freshly ground black pepper, to taste\n3 tablespoons olive oil, divided\n1 onion, chopped\n2 ribs celery, chopped\n2 carrots, chopped\n4 cloves garlic, minced\n1/2 teaspoon dried thyme\n1/2 teaspoon dried rosemary\n2 bay leaves\n1 cup red wine\n1 cup low-sodium beef broth\n28 ounces crushed tomatoes\n1 pound pappardelle pasta, cooked, for serving\nchopped fresh parsley (optional)\nfreshly grated Parmesan cheese (optional)", "method": "Season the beef generously with salt and pepper.\nHeat 2 tablespoons of olive oil in a Dutch oven over medium-high heat. Sear the beef a few minutes on each side until a rich brown crust forms; set aside on a plate.\nAdd the remaining 1 tablespoon oil. Add the onion, celery and carrots, sprinkle with salt and cook until softened, about 5-6 minutes. Add the garlic, thyme, rosemary and bay leaves and cook 1 minute.\nPour in the red wine and scrape up the brown bits. Add the beef broth, the seared meat and the crushed tomatoes.\nBring to a boil, then reduce to a simmer. Cover and cook 2.5-4 hours, until the beef shreds easily with a fork.\nRemove the bay leaves and beef. Shred the beef and return it to the pot, stirring into the sauce. Simmer about 20 minutes to deepen the flavour.\nServe over cooked pappardelle, finished with parsley and Parmesan if desired.", "source": "https://www.thecookierookie.com/beef-ragu/", "notes": "Serves 6. Prep 20 min, cook ~3 hr 20 min. The Cookie Rookie.", "favorite": false, "createdAt": 1782000100001}, {"id": "r49", "title": "Pork Miso Ramen (Sapporo Style)", "categories": ["Soups", "Meat/Poultry"], "ingredients": "BROTH\n1 tbsp ground sesame seeds\n1 tbsp smooth peanut butter or sesame paste/tahini\n1 tsp Chinese-style chicken bouillon powder\n500 ml freshly boiled water\n1 1/2 tbsp yellow miso paste (awase)\n\nSEASONED PORK\n1 tsp butter\n1 tsp lard\n4 cloves garlic, grated\n1 tbsp grated ginger\n2 tbsp Japanese leek (naganegi), white part, finely diced\n150 g ground pork\n1 tsp Japanese soy sauce (koikuchi shoyu)\n1 tsp mirin\n1 tsp oyster sauce\n1/2 tsp sugar\n1/2 tsp chili bean sauce (toban djan)\n\nTOPPINGS & NOODLES\n30 g spinach\n100 g bean sprouts\n2 portions ramen noodles\ncanned sweet corn\nfinely chopped green onions\nbutter\nramen eggs or soft boiled eggs\nnori (roasted seaweed)", "method": "Prepare an ice water bath. Boil salted water and blanch the bean sprouts and spinach stems for 30 seconds, then add the spinach leaves and cook 30 seconds more. Transfer to the ice water and set aside.\nAdd the sesame seeds, peanut butter and chicken bouillon to a heatproof bowl with a splash of boiling water. Whisk smooth, then add the remaining 500ml water and set by the stove.\nHeat a large wok on medium with the butter and lard. Reduce to medium-low and fry the garlic, ginger and leek until fragrant and lightly browned.\nIncrease to medium, add the ground pork and cook until cooked through with caramelised edges (about 3 minutes).\nAdd the soy sauce, mirin, oyster sauce, sugar and chili bean sauce. Stir-fry until the pan looks almost dry and the pork is well browned.\nPour the nutty broth into the wok, scraping up the browned bits. Heat to medium-high until small bubbles appear, then turn off the heat.\nPlace the miso in a fine strainer, dip into the hot broth and whisk to incorporate.\nBoil the ramen noodles 30 seconds less than the package says. Drain well.\nDivide the noodles into bowls, ladle over the broth and pork, and top with the spinach, bean sprouts, sweet corn, green onions, nori, ramen egg and a pat of butter. Drizzle with sesame or chili oil if desired.", "source": "https://sudachirecipes.com/pork-miso-ramen/", "notes": "Serves 2. ~15 minutes total. Sudachi Recipes.", "favorite": false, "createdAt": 1782000100002}, {"id": "r50", "title": "Chicken Stir Fry", "categories": ["Stir Fry", "Meat/Poultry"], "ingredients": "STIR FRY SAUCE\n1/4 cup chicken broth\n1/4 cup tamari soy sauce (or coconut aminos)\n1 tablespoon dry sherry (optional)\n1 tablespoon honey\n1 teaspoon sesame oil\n1 teaspoon rice vinegar (or apple cider vinegar)\n1 tablespoon cornstarch (or arrowroot powder)\n\nCHICKEN STIR FRY\n2 tablespoons avocado oil\n1 pound boneless skinless chicken breast, cut into 1-inch pieces\nsalt and pepper, to taste\n1 red bell pepper, deseeded and chopped\n1 small carrot, thinly sliced\n2 cups broccoli florets, bite-sized\n1 small yellow onion, chopped\n1 tablespoon finely grated fresh ginger\n4 garlic cloves, minced\n\nGARNISH\n1 tablespoon sesame seeds\n1 green onion, sliced", "method": "Make the sauce by whisking together the chicken broth, soy sauce, dry sherry, honey, sesame oil, rice vinegar and cornstarch in a small bowl. Set aside.\nCook the chicken in a large skillet or wok over medium-high heat with 1 tablespoon of oil. Add the chicken in a flat layer, season with salt and pepper and cook until lightly browned, about 4-5 minutes. Remove to a plate.\nAdd another tablespoon of oil to the pan with the bell pepper, onion, carrot and broccoli. Cook until tender, about 3-4 minutes.\nReturn the chicken to the pan with the ginger and garlic. Stir for 30 seconds, then pour in the sauce and stir-fry 1-2 minutes until thickened.\nGarnish with green onion and sesame seeds before serving.", "source": "https://downshiftology.com/recipes/chicken-stir-fry/", "notes": "Serves 4. Prep 15 min, cook 15 min. Downshiftology.", "favorite": false, "createdAt": 1782000100003}, {"id": "r51", "title": "Vegan Tofu Poke Bowl", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "FOR THE TOFU POKE\n1 block extra firm tofu, drained (approx. 350 g)\n1/2 cup (120 ml) soy sauce or tamari\n3 tbsp lime juice\n1 tbsp sesame oil\n2 tsp sambal oelek\n1 tbsp grated ginger\n3 cloves garlic, grated\n1 tsp sesame seeds\n\nFOR THE BOWLS\n1 1/4 cup short-grain brown rice (about 1/2 cup cooked per bowl)\n2 cups cucumber, cut into 1/4-inch diagonal half-moons\n1 tbsp rice wine vinegar or lime juice\n1 avocado, diced\n2 cups red cabbage, thinly sliced\n1 large carrot, peeled and grated\n1 cup edamame\n4 green onions, thinly sliced\n2 tbsp toasted sesame seeds\n2 large sheets nori, thinly sliced", "method": "Cook the rice in a medium pot with 2 cups water. Bring to the boil, cover, reduce to low and simmer 30-35 minutes until tender. Rest covered 5 minutes, season with salt and fluff.\nCut the tofu in half lengthwise, wrap in clean towels, place on a plate and weigh down with something heavy for at least 20 minutes.\nWhisk together the soy sauce, lime juice, sesame oil, sambal, ginger, garlic and sesame seeds in a medium bowl.\nCut the pressed tofu into 1/2-inch cubes, add to the marinade, toss and marinate 10-15 minutes, tossing occasionally. Drain, reserving the excess marinade.\nPlace the cucumbers in a colander with salt, gently squeeze, let sit 5 minutes, squeeze again and drain. Toss with the rice vinegar.\nDivide the rice between four bowls. Arrange the tofu, vegetables and nori on top. Drizzle with the reserved marinade and sprinkle with toasted sesame seeds.", "source": "https://runningonrealfood.com/tofu-poke-bowl/", "notes": "Serves 4. Prep 40 min, cook 40 min. Running on Real Food. Keeps 3 days in the fridge.", "favorite": false, "createdAt": 1782000100004}, {"id": "r52", "title": "Favorite Lentil Salad", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "1 cup uncooked lentils (green, French green, or brown), rinsed and picked over\n1 English cucumber, finely diced\n1 small red onion, finely diced\n3/4 cup chopped fresh mint leaves, loosely packed\n1/2 cup diced and drained sun-dried tomatoes\n3 tablespoons olive oil\n2 tablespoons freshly-squeezed lemon juice\n1 teaspoon Dijon mustard\n1 clove garlic, pressed or minced\n1/2 teaspoon fine sea salt\n1/4 teaspoon freshly-cracked black pepper", "method": "Cook lentils in a saucepan with 3 cups water or vegetable broth over medium-high heat until simmering. Reduce to medium-low, cover, and simmer 20-25 minutes until tender. Drain and rinse with cold water.\nWhile lentils cook, combine all dressing ingredients in a small bowl and whisk together.\nAdd cooked lentils, cucumber, red onion, mint, and sun-dried tomatoes to a large bowl. Drizzle with dressing and toss to combine.\nServe immediately or refrigerate in a sealed container for up to 3-4 days.", "source": "https://www.gimmesomeoven.com/lentil-salad/", "notes": "Serves 4. Prep 10 minutes, cook 30 minutes, total 40 minutes. Source: Gimme Some Oven.", "favorite": false, "createdAt": 1782000200000}, {"id": "r53", "title": "Moroccan Salad with Quinoa and Chickpeas", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "1 cup quinoa, cooked to package directions\n1/2 butternut squash, peeled and cubed\n2 beets, peeled and cubed (1 1/2 cups)\n2 cups cucumber, chopped\n2 cups cherry tomatoes, halved\n1/2 cup cilantro, chopped\n1/2 cup Italian parsley, chopped\n1 can chickpeas\n2 tablespoons lemon juice\n1 tablespoon olive oil\n2 teaspoons cumin\n1 teaspoon cinnamon\n1 teaspoon sweet paprika\n3/4 teaspoon sea salt\n1/2 teaspoon ginger\n1/2 teaspoon turmeric\n1/8 teaspoon cayenne\n3 tablespoons olive oil\n3 tablespoons lemon juice\n3 tablespoons white wine vinegar\n1 tablespoon honey (or date syrup for vegan option)\n1 teaspoon Dijon mustard\nSea salt and black pepper to taste", "method": "Preheat oven to 425 degrees F.\nCombine chickpeas with lemon juice and olive oil in a bowl. Mix spices separately, then coat chickpeas evenly with the spice blend.\nArrange cubed butternut squash and beets on a baking tray; spray with olive oil. Place spiced chickpeas on one section of the tray.\nBake for 25-30 minutes until chickpeas are crispy and vegetables are tender.\nMeanwhile, prepare dressing by combining all vinaigrette ingredients in a jar and shaking well. Cook quinoa according to package directions.\nLayer cooked quinoa with roasted vegetables and chickpeas. Top with fresh cucumber, tomatoes, and herbs.\nDrizzle with dressing and toss to combine.", "source": "https://sunkissedkitchen.com/moroccan-salad/", "notes": "Serves 6. Prep 20 minutes, cook 30 minutes, total 50 minutes. Source: Sunkissed Kitchen.", "favorite": false, "createdAt": 1782000200001}, {"id": "r54", "title": "Watermelon Salad with Feta Cheese", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "3 cups cubed watermelon\n1 medium cucumber, diced\n8 oz feta cheese, diced\n1/2 cup chopped fresh herbs (basil, mint, and/or parsley)\n1/2 cup thinly sliced red onion\n1/4 cup olive oil\n2 tablespoons red wine vinegar\n1 tablespoon runny honey\n1/4 teaspoon salt", "method": "Add watermelon, cucumber, feta cheese, herbs, and red onion to a shallow salad dish.\nWhisk together olive oil, vinegar, honey, and salt until combined. Pour over salad and gently toss.\nCover and chill in refrigerator until ready to serve (best eaten within 1-2 hours).", "source": "https://www.savorynothings.com/watermelon-salad-with-feta-cheese/", "notes": "Serves 6. Prep 15 minutes, no cooking, total 15 minutes. Source: Savory Nothings.", "favorite": false, "createdAt": 1782000200002}, {"id": "r55", "title": "The Viral Jennifer Aniston Salad Made Gluten-Free", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "1 cup quinoa, uncooked\n1/2 cup red onion, chopped\n1/2 cup parsley, chopped\n1/3 cup mint, chopped\n1/2 cup chickpeas, rinsed\n1/3 cup pistachios, unshelled\n1/2 cup cucumber, chopped\n1/2 cup crumbled feta cheese\nOlive oil, to taste\nLemon juice, to taste\nSea salt and pepper, to taste", "method": "Cook quinoa according to package directions and allow to cool.\nOnce cooled, add all ingredients to a large bowl and mix thoroughly.\nDrizzle with olive oil and lemon juice; season with salt and pepper to taste.", "source": "https://rachlmansfield.com/the-viral-jennifer-aniston-salad-made-gluten-free/", "notes": "Serves about 5. Prep 5 minutes, cook 20 minutes, total 25 minutes. Source: Rachl Mansfield (rachLmansfield.com).", "favorite": false, "createdAt": 1782000200003}, {"id": "r56", "title": "Prawn and Mango Salad with Avocado", "categories": ["Salad", "Fish"], "ingredients": "4 handfuls mixed lettuce leaves\n2 mangoes, cut into cubes\n1/2 red onion, thinly sliced\n20 cooked prawns, peeled and deveined\n2 avocados, cut into cubes\n1 handful coriander leaves, chopped\n1 long red chilli, chopped (optional)\n2 Tbsp white balsamic vinegar\n6 Tbsp olive oil\n1 Tbsp honey\n1/2 Tbsp wholegrain mustard", "method": "Arrange lettuce, mango, onion, prawns, and avocado in a large bowl or on a platter.\nCombine dressing ingredients in a jar and shake until blended. Adjust seasoning to taste.\nPour dressing over salad and top with coriander leaves and chilli.", "source": "https://mouthsofmums.com.au/recipe/prawn-and-mango-salad-with-avocado/", "notes": "Serves 4. Prep 10 minutes, no cooking required. Source: Mouths of Mums.", "favorite": false, "createdAt": 1782000200004}, {"id": "r57", "title": "Black Bean Mango Salad", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "3 cups diced mango (about 2 large or 3 medium mangoes)\n1 cup diced cucumber (1/2 English cucumber or 2 Persian cucumbers)\n1/2 cup diced red onion (about 1/2 medium onion)\n1/2 cup diced red bell pepper (about 1/2 pepper)\n2 tablespoons seeded and finely diced jalapeno (1 large jalapeno or 2 serrano)\n1 cup cherry or grape tomatoes, halved\n3 cups thinly sliced red cabbage (or Napa cabbage)\n1/4 cup chopped cilantro (leaves and light green stems)\n1 can cooked black beans, rinsed and drained (one 14 oz can), or 1 1/2-2 cups cooked beans\n2 tablespoons fresh lime juice (1 large lime)\n1/4 teaspoon sea salt or pink salt (or 1/8 teaspoon regular salt)\n1/8 teaspoon freshly ground black pepper\n1/8 teaspoon cayenne (optional)\n1/2 teaspoon agave syrup or maple syrup\n1 tablespoon extra virgin olive oil", "method": "Dice mango, cucumber, red onion, red bell pepper, and jalapeno using a vegetable chopper. Slice tomatoes in half, thinly slice cabbage, and finely chop cilantro. Add all to a large bowl with black beans.\nAdd lime juice and seasoning ingredients to a small bowl. Whisk in olive oil until emulsified and creamy.\nPour dressing over salad and toss gently to combine. Chill until ready to serve.", "source": "https://spicecravings.com/black-bean-mango-salad", "notes": "Serves 6. Prep 15 minutes, no cooking, total 15 minutes. Source: Spice Cravings.", "favorite": false, "createdAt": 1782000200005}, {"id": "r58", "title": "Roast Pumpkin, Spinach and Feta Salad", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "Pumpkin:\n600 g / 1.2 lb pumpkin (after peeling), cut into 3cm / 1.25\" cubes\n1 1/2 tbsp olive oil\nSalt and pepper\nDressing:\n2.5 tbsp / 50 ml extra virgin olive oil\n2 tbsp balsamic vinegar\n1 tbsp honey\nSalt and pepper\nSalad:\n1/4 cup / 35g pine nuts\n150 g / 5 oz baby spinach leaves (4 handfuls)\n60 g / 2 oz feta, crumbled", "method": "Preheat oven to 220C/430F (standard) or 200C/390F (fan/convection).\nToss pumpkin with olive oil, salt and pepper. Spread on baking tray, bake for 20 minutes. Remove from oven, flip, then bake for a further 7-10 minutes until golden but not mushy. Loosen pumpkin with egg flip, then if serving at room temperature, leave to cool.\nShake Dressing in a jar. Taste and adjust to taste.\nToast pine nuts in a dry skillet over medium heat until light golden and nutty. Remove immediately.\nPlace Spinach in a bowl. Drizzle with dressing then toss.\nAdd pumpkin, just a bit of feta and pine nuts, then GENTLY BRIEFLY toss just to disperse the feta.\nTransfer to serving plate. Sprinkle over remaining feta and pine nuts. Just before serving, drizzle with remaining dressing. Serve!", "source": "https://www.recipetineats.com/roast-pumpkin-spinach-and-feta-salad/", "notes": "Servings: 4-5 people (2-3 as a meal). Prep time: 10 minutes. Cook time: 25 minutes. Total time: 35 minutes. Source: RecipeTin Eats.", "favorite": false, "createdAt": 1782000200006}, {"id": "r59", "title": "Fresh Corn Salad", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "4 ears of corn, shucked and silks removed\n1/4 cup olive oil\n1 cup cherry or grape tomatoes, quartered\n1 English cucumber, sliced and quartered\n1/2 medium red onion, diced\n1/4 cup chopped fresh herbs (choose tender herbs like parsley, dill, cilantro, basil, mint, and tarragon)\n2 tablespoons apple cider vinegar\n1/2 teaspoon kosher salt\n1/4 teaspoon freshly ground black pepper\nOptional: crumbled feta", "method": "Preheat an outdoor grill or indoor grill pan on the stove to medium-high heat. Lightly brush the corn with 2 tablespoons of olive oil and grill for 8 to 10 minutes, rotating a few times for even charring. Then remove to a plate.\nOnce the corn is cool to the touch, use a large knife to shave off the kernels.\nPlace the corn kernels, tomatoes, cucumber, red onion, and herbs in a bowl. Drizzle with 2 tablespoons of olive oil, apple cider vinegar, salt, and pepper, then stir together.\nIf you'd like, garnish with crumbled feta before serving.", "source": "https://downshiftology.com/recipes/fresh-corn-salad/", "notes": "Servings: 6 servings. Prep time: 15 minutes. Cook time: 10 minutes. Source: Downshiftology.", "favorite": false, "createdAt": 1782000200007}, {"id": "r60", "title": "Roasted Vegetable Lentil Salad", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "1 white onion, sliced (approx. 2 cups chopped, 300 g)\n4 carrots, chopped (approx. 3.5 cups chopped, 450 g)\n2 zucchini, chopped in large chunks (approx. 4 cups chopped, 500 g)\n1 medium sweet potato, cubed (approx. 3 heaping cups, 425 g)\n1 tbsp chopped fresh rosemary, or 1 tsp dried\n1 tbsp chopped fresh thyme, or 1 tsp dried\n1 cup uncooked green or brown lentils\n2 1/4 cups vegetable broth or water, for cooking lentils\n4 tbsp hemp seeds, optional\n2 tbsp balsamic vinegar\n2 tbsp pure maple syrup or raw honey\nsalt and pepper", "method": "Pre-heat oven to 425 degrees F.\nChop all vegetables and spread on baking trays in a single layer. Drizzle with olive oil and sprinkle rosemary and thyme. Season with salt and pepper. Mix until well-coated.\nRoast vegetables in oven for 35-40 minutes until tender and browned.\nWhile vegetables roast, bring broth or water to boil. Add lentils, cover, reduce heat to simmer. Cook 15-20 minutes until tender but not mushy.\nMix balsamic vinegar and maple syrup together in a bowl.\nDivide cooked lentils and roasted vegetables between 4 bowls. Drizzle sauce over each serving. Season with salt and pepper as desired and serve.", "source": "https://runningonrealfood.com/roasted-vegetable-lentil-salad/", "notes": "Servings: 4. Prep time: 10 minutes. Cook time: 35 minutes. Total time: 45 minutes. Source: Running on Real Food.", "favorite": false, "createdAt": 1782000200008}, {"id": "r61", "title": "Pumpkin Avocado Feta Salad", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "Salad:\n600 g butternut pumpkin cut into 2 cm or 3/4\" cubes\n1 tablespoon olive oil\nsalt and pepper to taste\n60 g baby rocket (arugula) roughly torn if needed\n60 g baby spinach leaves\n1 large ripe avocado cubed\n80 g danish feta crumbled\n1/4 cup pine nuts\nDressing:\n2 tablespoon olive oil\n1/4 teaspoon balsamic vinegar\n1/4 teaspoon dijon mustard\nsalt and pepper to taste", "method": "Preheat the oven to 200C.\nToss pumpkin in olive oil and salt and pepper, then spread pumpkin in a single layer on a baking tray and bake for 15 mins, then flip pumpkin over and bake for a further 15 mins or until brown around the edges and cooked through.\nWhile the pumpkin is baking, in a medium serving bowl, add rocket, baby spinach and avocado, and mix gently to combine slightly.\nIn a small fry pan without oil, toast pine nuts until golden (watch them as they can burn quickly!) then remove to a bowl straight away.\nCombine dressing ingredients in a small jar and shake well, then add salt and pepper to taste.\nAdd pumpkin, feta and half the pine nuts to the lettuce mixture in the serving bowl, along with about half of the dressing and mix gently again to combine.\nSprinkle remaining pine nuts over the top, drizzle with remaining dressing and serve.", "source": "https://www.chefnotrequired.com/pumpkin-avocado-feta-salad/", "notes": "Servings: 4 as a side. Cook time: 35 minutes total. Source: Chef Not Required.", "favorite": false, "createdAt": 1782000200009}, {"id": "r62", "title": "Black Bean Quinoa Salad", "categories": ["Salad", "Mexican", "Vegan/Vegetarian"], "ingredients": "3 1/2 tablespoons olive oil divided\n1 cup uncooked quinoa rinsed and drained\n1 teaspoon salt plus more to taste\n2 medium sweet potatoes cut into 1/2 inch cubes\n1 1/2 teaspoons cumin\n1 teaspoon chili powder\nBlack pepper to taste\n1 (15 ounce) can black beans drained and rinsed\n1 (10 ounce) bag frozen corn thawed\n1 bell pepper stemmed, seeded, and diced\n1/4 red onion finely chopped\n1 avocado pitted and chopped\n1 lime zested and juiced\n1/4 cup chopped cilantro", "method": "Preheat oven to 425F and line a baking sheet with parchment paper. Toss sweet potatoes, 2 tablespoons oil, 1/2 teaspoon salt, cumin, chili powder, and black pepper. Arrange on prepared sheet and roast until golden brown, 25-30 minutes, mixing potatoes halfway through.\nHeat 1/2 tablespoon oil in a medium saucepan over medium high heat. Add quinoa and toast until fragrant, 2 minutes.\nAdd 1 3/4 cup water and 1/2 teaspoon salt. Bring to a boil, then turn heat to low and reduce to a gentle simmer and cover.\nCook for 15 minutes, remove from heat (while keeping the pot covered) and let stand for an additional 5 minutes. Fluff and keep warm.\nTo pot of cooked quinoa, add roasted sweet potatoes, remaining 1 tablespoon olive oil, beans, corn, pepper, red onion, avocado, lime juice, zest, and fresh cilantro.\nSeason to taste with kosher salt and black pepper. Mix and serve immediately or let cool and serve chilled.", "source": "https://feelgoodfoodie.net/recipe/southwest-quinoa-salad/", "notes": "Servings: 4 servings. Prep time: 10 minutes. Cook time: 25 minutes. Source: Feel Good Foodie.", "favorite": false, "createdAt": 1782000200010}, {"id": "r63", "title": "Garlic Herb Roasted Potatoes Carrots and Zucchini", "categories": ["Vegan/Vegetarian"], "ingredients": "1 1/4 lb baby potatoes, halved\n1 lb medium carrots, scrubbed clean, cut into 2-inch pieces\n3 tablespoon olive oil, divided\n1 tablespoon minced fresh thyme\n1 tablespoon minced fresh rosemary\nSalt and freshly ground black pepper\n12 oz. zucchini, trimmed and cut into 1-inch pieces\n4 cloves garlic, minced", "method": "Preheat oven to 400F (200C) and set rack to middle. In large bowl, toss potatoes and carrots with 2 1/2 tablespoons olive oil, thyme, rosemary, and season with salt and pepper. Spread onto rimmed baking sheet and roast for 20 minutes.\nToss zucchini in bowl with remaining 1/2 tablespoon olive oil and season lightly with salt. Add to baking sheet with potatoes and carrots. Add minced garlic and toss everything into an even layer. Return to oven and roast until all vegetables are tender and slightly browned, about 20 minutes longer. Serve warm.", "source": "https://www.eatwell101.com/roasted-potatoes-carrots-zucchini-recipe", "notes": "Servings: 5. Prep time: 10 minutes. Cook time: 40 minutes. Total time: 50 minutes. Source: Eatwell101.", "favorite": false, "createdAt": 1782000200011}, {"id": "r64", "title": "Mediterranean Chickpea Salad", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "1 (15 ounce) can chickpeas, rinsed and drained\n2 mini cucumbers, chopped\n1 tablespoon red onion, chopped\n1 tablespoon fresh oregano, chopped\n1 tablespoon fresh parsley, chopped\n1/2 red bell pepper, chopped\n1 cup little tomatoes (grape, cherry, etc.), cut into halves\n1/2 cup Kalamata olives\n3.5 ounces feta (packed in oil & herbs if possible)\n2 tablespoons olive oil\n1/2 tablespoon lemon juice\n1 clove garlic, minced\nSalt & pepper to taste", "method": "1. Drain and rinse chickpeas; add them to a salad bowl.\n2. Prepare all vegetables and herbs, adding them to the bowl along with the feta and olives.\n3. Pour the dressing ingredients directly into the salad bowl and toss gently. Taste and adjust seasoning as needed with additional oil, salt, and pepper.", "source": "https://www.saltandlavender.com/mediterranean-chickpea-salad/", "notes": "Serves 4. Prep time 20 minutes, cook time 0 minutes, total time 20 minutes. Salt & Lavender.", "favorite": false, "createdAt": 1782000200012}, {"id": "r65", "title": "Moroccan Cauliflower and Couscous Salad", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "Main Salad:\n1 medium head cauliflower, cut into florets (about 6 heaping cups)\n3 Tbsp. extra-virgin olive oil\n1 tsp. ground coriander\n3/4 tsp. ground turmeric\n1 tsp. kosher salt, divided\n1/2 tsp. black pepper\n1 cup uncooked pearl couscous\n1 (15-oz.) can chickpeas, rinsed and drained\n1/3 cup sliced almonds\n1/3 cup raisins\n1/4 cup roughly chopped or torn mint leaves\n1/3 cup roughly chopped or torn parsley leaves\n\nLemony Paprika Dressing:\n1/3 cup extra-virgin olive oil\n2 Tbsp. finely chopped fresh parsley\n2 Tbsp. fresh lemon juice\n1 grated or finely minced garlic clove\n3/4 tsp. paprika\n1/2 tsp. ground cumin\n1/4 tsp. kosher salt", "method": "1. Heat oven to 425°F. Toss cauliflower with 3 Tbsp. olive oil, coriander, turmeric, 1/2 tsp. salt, and pepper. Spread on baking sheet and roast 25-30 minutes until crisp-tender and browned, tossing halfway through.\n2. Bring 1½ cups water to boil in saucepan. Add couscous and remaining ½ tsp. salt, return to boil, cover, reduce heat to simmer. Cook 15 minutes until liquid absorbs. Drain excess water and stir in chickpeas.\n3. In small bowl, combine parsley, lemon juice, garlic, paprika, cumin, and salt. Gradually whisk in olive oil until combined.\n4. In large bowl, combine couscous mixture, roasted cauliflower, almonds, raisins, mint, and parsley. Add dressing and toss. Serve warm, chilled, or at room temperature.", "source": "https://dishingouthealth.com/moroccan-couscous-salad/", "notes": "Serves 6. Prep time 15 minutes, cook time 25 minutes, total time 40 minutes. Dishing Out Health.", "favorite": false, "createdAt": 1782000200013}, {"id": "r66", "title": "Vibrant Curry Cashew Chickpea Quinoa Salad", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "For the quinoa:\n¾ cup quinoa\n1⅔ cup water\n1 (15 ounce) can chickpeas, rinsed and drained\n¾ cup frozen green peas, thawed\n1 tablespoon sesame oil (or olive oil substitute)\n½ tablespoon freshly grated ginger\n1 teaspoon curry powder\n¼ teaspoon ground turmeric\n¼ teaspoon garlic powder\n½ teaspoon salt\nFreshly ground black pepper\n\nFor the mix-ins:\n1 red bell pepper, diced\n½ cup shredded carrots\n½ cup dried cherries (or dried cranberries)\n¼ cup finely diced red onion\n⅓ cup finely diced cilantro\n⅓ cup finely diced flat leaf parsley\n\nFor the maple cayenne toasted cashews:\n¾ cup raw cashews\n½ tablespoon pure maple syrup\n¼ teaspoon cayenne pepper\n½ teaspoon sea salt", "method": "1. Add quinoa and water to a medium pot; bring to a boil. Cover, reduce heat to low, and cook for exactly 15 minutes. Remove from heat, fluff with a fork, replace lid, and let steam 5–10 more minutes.\n2. Stir in chickpeas, peas, sesame oil, ginger, curry powder, turmeric, garlic powder, salt, and black pepper.\n3. Fold in red bell pepper, shredded carrots, dried cherries, red onion, cilantro, and parsley.\n4. Toast cashews in a skillet over medium heat for 4–6 minutes, stirring frequently until golden brown and fragrant. Remove from heat and immediately add maple syrup, cayenne pepper, and sea salt. Stir for 30 seconds, then transfer to a plate to cool.\n5. Top quinoa with cooled cashews and serve. Wait to add cashews until serving to maintain crunchiness.", "source": "https://www.ambitiouskitchen.com/curry-cashew-chickpea-quinoa-salad/", "notes": "Serves 4 (main meal) or 6 (side dish). Prep time 20 minutes, cook time 25 minutes, total time 45 minutes. Ambitious Kitchen.", "favorite": false, "createdAt": 1782000200014}, {"id": "r67", "title": "Mexican Quinoa Salad", "categories": ["Salad", "Mexican", "Vegan/Vegetarian"], "ingredients": "1 cup quinoa\n1-1.5 cups water\n1 cob corn (or 1/2 cup cooked kernels)\n1/4 red onion\n1 cup cooked black beans\n2 tomatoes\n1 avocado (ripe but firm)\n1/2 cup cilantro\n1 jalapeño\n2 limes\nSalt\nPepper", "method": "1. Add quinoa, water, and sea salt to the Instant Pot. Place the trivet inside and position the corn cob on top. Seal and set to 1 minute on high pressure. Wait for full natural pressure release. (Alternative stove-top instructions available in blog post.)\n2. While cooking, finely chop red onion, dice tomato, chop cilantro, deseed and finely chop jalapeño, and set everything aside.\n3. Cut kernels off the cooked corn cob and set aside.\n4. Cut avocado in half, pit and peel, then dice. Do this last right before assembling to maintain freshness.\n5. Assemble by fluffing the quinoa into a large salad bowl. Add chopped vegetables, fruits, and black beans. Season with sea salt, pepper, and lime juice. Mix and serve.", "source": "https://greenhealthycooking.com/mexican-quinoa-salad/", "notes": "Serves 4 people. Prep time 5 minutes, cook time 15 minutes, total time 20 minutes. Green Healthy Cooking.", "favorite": false, "createdAt": 1782000200015}, {"id": "r68", "title": "Spicy Cashew Chickpea Broccoli Salad with Ginger Peanut Dressing", "categories": ["Salad", "Vegan/Vegetarian"], "ingredients": "For the Salad:\n1 (15 ounce) can chickpeas, rinsed and drained\n1 medium head broccoli, very finely chopped into bite-sized pieces (3-4 cups)\n2-3 cups packed shredded red cabbage\n1 cup shredded carrots\n1 red bell pepper, diced\n⅓ cup diced green onions (mostly green part)\n1 jalapeño, finely diced (remove seeds if heat-sensitive)\n½ cup chopped fresh cilantro\n\nFor the Dressing:\n¼ cup natural creamy peanut butter (just nuts and salt)\n2 ½ tablespoons low sodium gluten-free soy sauce or coconut aminos\n1 tablespoon honey (or pure maple syrup for vegan)\n1 tablespoon rice vinegar or fresh lime juice\n1 tablespoon sesame oil (or olive oil)\n1 tablespoon grated fresh ginger\n1 clove garlic, finely minced\n¼ teaspoon red cayenne pepper (optional; add more for extra spice)\n2-3 tablespoons warm water (to thin dressing)\n\nTo Garnish:\n½ cup roasted cashew halves (honey roasted recommended)", "method": "1. Combine chickpeas, finely chopped broccoli, shredded red cabbage, shredded carrots, red bell pepper, green onion, jalapeño, and cilantro in a large bowl.\n2. Whisk together peanut butter, soy sauce, honey, rice vinegar, sesame oil, ginger, garlic, cayenne pepper, and water in a small bowl to create the dressing.\n3. Pour dressing over salad and toss thoroughly to combine.\n4. Serve immediately with fresh lime juice and roasted cashews, or refrigerate for later (add cashews just before eating to maintain crunch). Keeps 3-5 days covered in the fridge.", "source": "https://www.ambitiouskitchen.com/thai-broccoli-salad/", "notes": "Serves 4. Prep time 30 minutes, cook time 0 minutes, total time 30 minutes. Ambitious Kitchen.", "favorite": false, "createdAt": 1782000200016}, {"id": "r69", "title": "Classic Chili Con Carne", "categories": ["Mexican", "Meat/Poultry"], "ingredients": "2 tablespoons olive oil\n2 pounds ground beef\n1 large onion, chopped\n4 cloves garlic, chopped\n2 tablespoons ground cumin\n2 tablespoons dried oregano\n2 teaspoons smoked paprika\n½ teaspoon cayenne pepper\n2 tablespoons tomato paste\n28 oz can crushed tomatoes\n½ cup beef stock\n14.5 oz can kidney beans, drained\nSalt and pepper to taste\nGood handful fresh parsley, chopped", "method": "1. Heat olive oil in large pan over medium heat. Add onions and sauté until lightly golden, 2-3 minutes. Add garlic and fry another minute.\n2. Add ground beef; fry until fully cooked with no pink remaining, about 8 minutes.\n3. Add cumin, oregano, paprika, cayenne pepper, and tomato paste. Cook, stirring, about 2 minutes.\n4. Add tomatoes, beef stock, and beans. Season with salt and pepper, stir in parsley, and bring to simmer over low heat.\n5. Cook, stirring occasionally, until chili thickens slightly, about 1-1½ hours.", "source": "https://www.errenskitchen.com/classic-chili-con-carne/", "notes": "Serves 5 people. Prep time 20 minutes, cook time 1 hour 30 minutes, total time 1 hour 50 minutes. Erren's Kitchen.", "favorite": false, "createdAt": 1782000200017}, {"id": "r70", "title": "Slow Cooker Lentil Sweet Potato Chili", "categories": ["Mexican", "Vegan/Vegetarian", "Soups", "Slow Cooker"], "ingredients": "1 yellow onion, chopped\n3 cloves garlic, minced\n2 sweet potatoes, chopped\n2 x 796ml/28oz cans of diced tomatoes\n1 x 398ml/14oz can of red kidney beans, drained and rinsed\n1 ½ cups frozen corn\n3 ½ cups vegetable broth\n1 ½ cups dried green lentils\n2 tablespoons chili powder\n2 teaspoons cumin\nSalt and pepper to taste\nDiced avocado for garnish (optional)\nFresh parsley or cilantro for garnish (optional)", "method": "1. Add all ingredients to slow cooker and mix well.\n2. Cover and cook on low for 8 hours or on high for 4.5 hours.\n3. Season with salt and pepper to taste, adjusting chili powder as desired (add 1 teaspoon at a time for additional flavor).\nNote: Instant Pot instructions also available; reduce broth to 3 cups and pressure cook for 10 minutes with 15-minute natural release.", "source": "https://delightfuladventures.com/lentil-sweet-potato-chili/", "notes": "Servings: 6. Prep time: 15 minutes. Cook time: 8 hours. Total time: 8 hours 15 minutes. Site: Delightful Adventures.", "favorite": false, "createdAt": 1782000200018}, {"id": "r71", "title": "Easy Fish Tacos", "categories": ["Mexican", "Fish"], "ingredients": "Fish:\n1½ pounds cod, halibut, tilapia or mahi mahi, or other mild white fish\n1½ teaspoons chili powder\n1 teaspoon smoked paprika, or sweet paprika\n½ teaspoon garlic powder\n¼ teaspoon salt\n1 tablespoon olive oil\nFish Taco Sauce:\n½ cup plain Greek yogurt, or 5 tablespoons sour cream plus 3 tablespoons mayonnaise\n1½ tablespoons lime juice, from 1 lime\n½ teaspoon garlic powder\n¼-½ teaspoon sriracha sauce, or to taste\npinch of salt\nwater, as needed to thin sauce\nFor Serving:\n8 small corn or flour tortillas\n½ small red cabbage, shredded\n1 avocado, sliced\n¼ cup coarsely chopped fresh cilantro\n1 lime, cut into wedges", "method": "Prepare the Fish:\n1. Pat the fish dry with paper towels. Combine the chili powder, smoked paprika, garlic powder and salt in a small bowl. Sprinkle the seasoning over both sides of the fish and gently pat onto the fish.\n2. Heat the olive oil in a nonstick skillet over medium heat. Add the fish to the pan and cook until the internal temperature reaches 145°F, about 4-7 minutes per side.\nMake the Fish Taco Sauce:\n3. In a bowl, whisk together the Greek yogurt, lime juice, garlic powder, sriracha and salt. If too thick, thin with water a teaspoon at a time until reaching desired consistency.\nWarm the Tortillas:\n4. (Optional) Warm and slightly crisp the tortillas, one at a time, in a hot skillet on the stove. Alternatively, warm all at once in the microwave.\nAssemble Tacos:\n5. Fill each tortilla with shredded cabbage, cooked fish, avocado slices, fish taco sauce and chopped cilantro. Serve with lime wedges.", "source": "https://kristineskitchenblog.com/fish-tacos/", "notes": "Servings: 4. Prep time: 15 minutes. Cook time: 12 minutes. Total time: 27 minutes. Site: Kristine's Kitchen.", "favorite": false, "createdAt": 1782000200019}, {"id": "r72", "title": "Homemade Taco Seasoning", "categories": ["Mexican", "Vegan/Vegetarian"], "ingredients": "1 tbsp chilli powder\n1 1/2 tsp ground cumin\n1 tsp smoked paprika\n1 tsp sea salt\n1 tsp freshly ground black pepper\n1/2 tsp dried oregano\n1/2 tsp garlic powder\n1/2 tsp onion powder\n1/4-1/2 tsp cayenne pepper or chilli flakes (optional, to taste)", "method": "Combine all the spices in a small bowl and mix well.\nStore in an airtight jar.\nUse about 2 tablespoons per 500g (1 lb) of meat, beans or vegetables.", "source": "https://foodbabe.com/homemade-taco-seasoning-recipe-replace-packets-full-of-processed-ingredients/", "notes": "Original page (foodbabe.com) was inaccessible, so this is a standard equivalent blend. Site: Food Babe.", "favorite": false, "createdAt": 1782000200020}, {"id": "r73", "title": "Smoky Black Eyed Pea Soup", "categories": ["Vegan/Vegetarian", "Soups"], "ingredients": "1 lb. black eyed peas, soaked (or 3 cans 14oz, drained and rinsed)\n2 tablespoon olive oil or 1/3 cup water\n1 yellow onion, diced\n2 large carrots, diced\n2 celery ribs, sliced\n3 garlic cloves, minced\n1 tablespoon smoked paprika\n1 teaspoon thyme\n1 teaspoon basil\n1 teaspoon oregano\n1 teaspoon garlic powder\n1 teaspoon onion powder\n1/2–1 teaspoon red pepper flakes, optional\n1 can (28oz.) diced tomatoes, with juices\n2–3 cups collard greens, chopped\n6 cups low-sodium vegetable broth\n1/2–1 teaspoon salt, or to taste\n1/2–1 teaspoon pepper, or to taste", "method": "1. Heat oil or water in a large dutch oven over medium heat. Add onion, carrots, and celery; sauté for 7–10 minutes.\n2. Add garlic, smoked paprika, thyme, basil, oregano, garlic powder, and onion powder. Cook until fragrant, about 1–2 minutes.\n3. Add black-eyed peas, tomatoes, and vegetable broth. Bring to a boil, cover, reduce heat to low, and simmer for 20 minutes (canned) to 1¼ hours (soaked) until beans are tender.\n4. About 5–10 minutes before completion, stir in collard greens. Season generously with salt and pepper.\n5. Serve with lemon juice or cornbread if desired.", "source": "https://simple-veganista.com/black-eyed-pea-soup/", "notes": "Yield: Serves 6–8. Prep time: 10 minutes. Cook time: 1 hour 15 minutes. Total time: 1 hour 25 minutes. Site: The Simple Veganista.", "favorite": false, "createdAt": 1782000200021}, {"id": "r74", "title": "Slow Cooker Hungarian Goulash", "categories": ["Slow Cooker", "Meat/Poultry"], "ingredients": "2 pounds beef stew meat chuck roast cut into bite-sized pieces\n1 onion diced\n2 cups beef broth or 2 bouillon cubes & 2 cups of water\n1 15oz can diced tomatoes with juice\n2 cloves garlic minced\n3 Tablespoons sweet paprika\n1 teaspoon salt\n½ teaspoon black pepper\n1 bay leaf\n1 ½ cups carrots diced\n2 cups russet potatoes peeled & diced\nFresh minced parsley (optional - for topping)\nSour cream (optional - to stir into goulash when serving)", "method": "1. Begin by prepping and cutting the meat and vegetables.\n2. To the slow cooker insert, add the meat, garlic, and seasonings.\n3. Top the meat with the cut-up onion, carrots, and potatoes.\n4. Add the canned tomatoes with juice and beef broth.\n5. Stir everything to combine in the slow cooker.\n6. Set to high for 4 hours or low for 8-10 hours.\n7. When done, remove the bay leaf. Ladle into serving bowls and top with optional ingredients.\n8. Serve immediately.", "source": "https://theshortordercook.com/slow-cooker-hungarian-goulash/", "notes": "Servings: 8. Prep time: 20 minutes. Cook time: 4 hours. Total time: 4 hours 20 minutes. Site: The Short Order Cook.", "favorite": false, "createdAt": 1782000200022}, {"id": "r75", "title": "Easy Vegan Slow Cooker Lentil Soup", "categories": ["Vegan/Vegetarian", "Soups", "Slow Cooker"], "ingredients": "1 15 oz can Diced tomatoes\n1 16 oz bag Dry lentils\n2 large Sliced carrots\n2 stalks Sliced celery\n2 cups Baby spinach\n1 medium Diced onion\n1 large Peeled & diced sweet potato\n8 cups Low sodium vegetable stock\nSalt to taste\nPepper to taste", "method": "1. Add all ingredients to the slow cooker except spinach.\n2. Cook on low for 6-7 hours.\n3. Add spinach 10 minutes before cooking completes.", "source": "https://gina-michele.com/2017/10/17/vegan-slow-cooker-easy-lentil-soup-2/", "notes": "Yield: 6 servings. Prep time: 5 minutes. Cook time: 6 hours 30 minutes. Total time: 6 hours 35 minutes. Site: Gina Michele.", "favorite": false, "createdAt": 1782000200023}, {"id": "r76", "title": "Crockpot Pumpkin Soup (5 Ingredients!)", "categories": ["Soups", "Slow Cooker", "Vegan/Vegetarian"], "ingredients": "1 small pumpkin, around 2 pounds\n2 medium russet potatoes\n1 small onion, roughly chopped\n4 cups vegetable broth\n1 teaspoon kosher salt\n½ teaspoon ground black pepper\n½ cup heavy cream", "method": "1. Scrub the pumpkin thoroughly. Cut in half, remove seeds, and cut into 2-inch chunks. Leave peel on if desired.\n2. Peel potatoes and cut into 2-inch chunks.\n3. Add pumpkin, onion, potatoes, vegetable broth, salt, and pepper to slow cooker. Cook on low 7-8 hours or high 4 hours.\n4. Use an immersion blender to purée soup until smooth. Cover partially with towel to prevent splatters.\n5. Slowly stir in heavy cream. Add desired seasonings and serve immediately or keep on low heat until ready.", "source": "https://www.rachelcooks.com/crockpot-pumpkin-soup/", "notes": "Servings: 8. Prep time: 15 minutes. Cook time: 4 hours (on high) or 7-8 hours (on low). Total time: 4 hours 15 minutes. Source: Rachel Cooks.", "favorite": false, "createdAt": 1782000200024}, {"id": "r77", "title": "Slow Cooker Black Bean Soup", "categories": ["Soups", "Slow Cooker", "Vegan/Vegetarian"], "ingredients": "1 medium onion diced\n1 red bell pepper diced\n1 green bell pepper diced\n1 can diced tomatoes undrained (14.5 ounce)\n3 celery stalks chopped\n1 jalapeno pepper deseeded and diced\n3 cloves fresh garlic minced\n1 pound dry black beans rinsed\n1 tsp salt or more to taste\n½ tsp black pepper\n1 tsp hot sauce (Texas Pete recommended)\n1 Tablespoon paprika\n2 Tablespoon chili powder\n2 tablespoons cumin\n2 leaves bay\n6.5 cups vegetable stock", "method": "1. Place all ingredients except optional toppings in slow cooker and cook on low for 10 hours (or high for 6 hours).\n2. One hour before serving, remove bay leaves and use a potato masher to mash some beans for thicker texture.\n3. Serve with desired toppings.\n4. Refrigerate leftovers for up to one week.", "source": "https://www.apinchofhealthy.com/slow-cooker-black-bean-soup/", "notes": "Servings: 8. Prep time: 20 minutes. Cook time: 10 hours. Total time: 10 hours 20 minutes. Source: A Pinch of Healthy.", "favorite": false, "createdAt": 1782000200025}, {"id": "r78", "title": "The Best Chicken Soup You'll Ever Eat", "categories": ["Soups", "Meat/Poultry"], "ingredients": "1 tablespoon avocado oil or olive oil\n6 cloves of garlic, minced\n1 yellow onion, diced\n2 large carrots, thinly sliced\n2 celery stalks, roughly chopped\n1 tablespoon fresh grated ginger\n1 tablespoon fresh grated turmeric (or 1 teaspoon ground turmeric)\n6 cups low sodium chicken broth\n1 pound boneless skinless chicken breast or thighs\n1 teaspoon freshly chopped rosemary\n1 teaspoon freshly chopped thyme, stems removed\n½ teaspoon salt\nFreshly ground black pepper\n1 cup pearl couscous\n⅔ cup frozen peas (optional, but recommended)", "method": "1. Place a large dutch oven or pot over medium high heat and add in oil. Once oil is hot, add in garlic, onion, carrots and celery; cook for a few minutes until onion becomes translucent.\n2. Next add in grated ginger and grated turmeric. Saute for 30 seconds to let the spices cook a bit, then add in chicken broth, chicken breast, rosemary, thyme, salt and pepper.\n3. Bring soup to a boil, then stir in couscous. You'll want the chicken to be covered by the broth so make sure you stir them down to the bottom.\n4. Reduce heat to medium low and simmer uncovered for 20-25 minutes or until chicken is fully cooked.\n5. Once chicken is cooked, remove with a slotted spoon and transfer to a cutting board to shred with two forks. Add chicken back to pot then stir in frozen peas. If you find that you don't have enough broth, feel free to add in another cup. Everyone likes their soup differently. Taste and adjust seasonings, if necessary. Enjoy.", "source": "https://www.ambitiouskitchen.com/the-best-chicken-soup-recipe/", "notes": "Servings: 6. Prep time: 20 minutes. Cook time: 35 minutes. Total time: 55 minutes. Source: Ambitious Kitchen.", "favorite": false, "createdAt": 1782000200026}, {"id": "r79", "title": "Slow Cooker Butternut Squash Lentil Curry", "categories": ["Curries", "Slow Cooker", "Vegan/Vegetarian"], "ingredients": "2 cups red lentils (dried; uncooked)\n4 cups butternut squash (peeled, seeds scooped out, and cubed)\n1 onion (finely chopped)\n2 cloves garlic (minced)\n2 tablespoons fresh ginger (grated or finely chopped)\n1 tablespoon curry powder\n2 teaspoons ground coriander\n2 teaspoons garam masala\n2 teaspoons turmeric\n2 teaspoons ground cumin\n1 teaspoon salt\n13.5 oz coconut milk (1 can; 400mL; full fat)\n19 oz diced tomatoes (1 can; 540mL; including juices)\n3 cups stock\n½ lime (juiced; after cooking)\nSalt to taste (if needed; after cooking)", "method": "1. Combine all ingredients except lime juice in a large slow cooker and cook on low for 8 hours.\n2. Add salt and lime juice, adjusting seasonings to taste.\n3. Mash with a potato masher or serve as is.", "source": "https://sweetpeasandsaffron.com/slow-cooker-butternut-squash-lentil-curry/", "notes": "Servings: 8. Prep time: 20 minutes. Cook time: 8 hours. Total time: 8 hours. Source: Sweet Peas & Saffron.", "favorite": false, "createdAt": 1782000200027}, {"id": "r80", "title": "Vegan Thai Red Curry", "categories": ["Curries", "Vegan/Vegetarian"], "ingredients": "1-2 tablespoons olive oil\n1 small yellow onion, chopped\n4 cloves garlic, minced\n1 tablespoon fresh ginger, grated\n1 red bell pepper, thinly sliced into 2 inch slices\n1 yellow bell pepper, thinly sliced into 2 inch slices\n2 medium carrots, peeled and cut into matchsticks or small rounds\n1 cup broccoli florets\n1 cup cauliflower florets\n2 1/2 tablespoons Thai red curry paste\n1 15-oz can full fat coconut milk\n1/2 cup water\n2 cups thinly sliced kale OR spinach\n2 medium roma tomatoes, diced\n2 teaspoons pure maple syrup\n1 tablespoon low sodium soy sauce (tamari for gluten free)\n1 tablespoon fresh lime juice (about 1 lime)\n4 cups cooked white or brown rice\nOptional: Sriracha hot sauce, fresh chopped basil or cilantro", "method": "1. Prepare all vegetables and have them nearby before heating the pan. Cook rice according to package instructions.\n2. Heat olive oil in a large skillet over medium-high heat. Once warm, add the chopped onion and cook, stirring often, until translucent (about 3 minutes). Add garlic and ginger and cook for 30 seconds.\n3. Add bell peppers, carrots, broccoli, and cauliflower. Continue cooking, stirring frequently, for 2-3 minutes.\n4. Add the red curry paste, coconut milk, and water. Stir well for a few minutes until the paste dissolves. Add kale or spinach and stir. Bring to a simmer, lower heat, cover, and cook for 5-10 minutes until vegetables soften.\n5. Stir in chopped tomatoes, maple syrup, soy sauce, and fresh lime juice. Remove from heat.\n6. Serve immediately with cooked rice and optional Sriracha and fresh basil/cilantro if desired.", "source": "https://www.noracooks.com/red-thai-curry-vegetables/", "notes": "Servings: 6. Prep time: 10 minutes. Cook time: 20 minutes. Total time: 30 minutes. Source: Nora Cooks.", "favorite": false, "createdAt": 1782000200028}, {"id": "r81", "title": "Rogan Josh (Indian Lamb Curry)", "categories": ["Curries", "Meat/Poultry"], "ingredients": "3 1/2 tbsp ghee (or substitute butter)\n1 cinnamon stick\n6 green cardamom pods, lightly bruised\n4 cloves\n1 large onion, finely chopped\n3 cloves garlic, finely minced\n1 tbsp ginger, finely grated\n5 tbsp tomato passata (US: tomato puree/sauce)\n1 tsp cooking salt or kosher salt\n750g/1.5lb boneless lamb shoulder, cut into 3cm/1.2\" cubes\n1 1/2 cups chicken stock (salt reduced)\n2 tbsp paprika (normal or sweet)\n3/4 tsp chilli powder\n4 tsp ground coriander\n4 tsp ground cumin\n2 tsp turmeric powder\n1/4 tsp nutmeg powder\n1 tsp garam masala\n1/2 tsp fennel powder\n1/2 cup plain yoghurt (Greek yogurt acceptable)\n1/2 tsp extra garam masala\n1/2 tsp extra fennel powder\nChopped coriander leaves (garnish)\nFinely shredded ginger (garnish)\nYogurt (garnish)\nBasmati rice (serving)", "method": "1. Melt ghee over medium heat in large heavy-based pot. Add cinnamon, cardamom and cloves; cook for one minute.\n2. Add onion and cook for 7 minutes, stirring frequently, until pieces are golden and starting to brown on the edges. Add garlic and ginger; cook for another minute.\n3. Stir in the ground spices; cook for 30 seconds.\n4. Mix in tomato passata and salt, then add stock and mix. Add lamb and stir; bring to simmer.\n5. Place lid on pot and adjust heat to low or medium-low so it's simmering gently. Cook 1 hour 45 minutes, stirring occasionally, until lamb is quite tender—use 2 forks to check; it should pry apart easily.\n6. Remove lid and continue cooking for another 15 minutes to reduce sauce slightly—lamb should be very tender by this stage.\n7. Stir in yogurt, extra garam masala, and fennel. Cook for another few minutes.\n8. Serve with basmati rice, sprinkled with fresh coriander leaves and other garnishes as desired.", "source": "https://www.recipetineats.com/rogan-josh/", "notes": "Servings: 4 people. Prep time: 20 minutes. Cook time: 2 hours 30 minutes. Source: RecipeTin Eats.", "favorite": false, "createdAt": 1782000200029}, {"id": "r82", "title": "Arepas", "categories": ["Breakfast", "Vegan/Vegetarian"], "ingredients": "1.5 cups harina pan\n0.5 cup milk\n1 tsp salt\n1 tsp sugar\n1 cup hot water\n100g grated haloumi", "method": "Mix everything together with a spoon first, then with your hands, until the mixture has no bits in it.\nLightly grease the inside of a bag, take a handful of mixture and squash it flat.\nPut onto a greased plate. When ready, cook on a pan greased with butter.", "source": "", "notes": "From personal notes.", "favorite": false, "createdAt": 1782000300000}, {"id": "r83", "title": "Dal Makhani", "categories": ["Curries", "Vegan/Vegetarian"], "ingredients": "1 cup beluga lentils\n4 cups water\n4 tbsp garam masala\n2 tbsp cumin\n1 tsp fenugreek\n1 tsp ground garlic (garlic powder)\n6 garlic cloves, minced\n6 tbsp vegan butter\n1.5 cups coconut milk\n1/2 cup tomato paste\n2 x 400g tins kidney beans\nsalt and pepper, to taste\n1 onion", "method": "In a pot, melt the vegan butter and add the minced garlic, spices (garlic powder, fenugreek, garam masala) and optional onion and jalapenos or chilli. Fry everything for 2 minutes, then add the beluga lentils and water.\nCook for around 15 minutes, then add the kidney beans, tomato paste and coconut milk. Mix well and cook for 5 more minutes.\nServe plain in bowls, or with rice.", "source": "", "notes": "Serves 4. Prep 5 min, cook 20 min. Vegan one-pot. From personal notes.", "favorite": false, "createdAt": 1782000300001}, {"id": "r84", "title": "Mushroom and Chickpea Curry", "categories": ["Curries", "Vegan/Vegetarian"], "ingredients": "2 cups diced button mushrooms\n2 cups (500g) cooked chickpeas\n3 medium onions, chopped\n2 x 400g tins tomato\n1/2 cup water (ideally chickpea water)\n5 cloves garlic, finely grated\n1 1/2 tbsp ginger, finely grated\n1 tbsp cumin powder\n1 1/2 tsp coriander powder\n1/4-1/2 tsp red chilli powder\n1 1/2 tsp turmeric powder\n1 1/2 tsp garam masala\nsalt, to taste\n3 tablespoons oil of choice\ncilantro, for garnish", "method": "Heat the oil and add the onions. Cook for 5 minutes over a medium flame.\nAdd the ginger and garlic and cook for 2 minutes.\nAdd the chopped tomatoes and water. Cook for 3 minutes.\nAdd the cumin, coriander, chilli and turmeric powders and salt. Cook until the oil starts to separate from the masala.\nAdd the mushrooms and chickpeas and combine well. Cover and cook for 2 minutes.\nStir and cook for 5 more minutes.\nSprinkle over a little garam masala and garnish with cilantro.", "source": "", "notes": "Serves 6. Cooking time 30 min. From personal notes.", "favorite": false, "createdAt": 1782000300002}, {"id": "r85", "title": "Scrambled Tofu", "categories": ["Breakfast", "Vegan/Vegetarian"], "ingredients": "plenty of olive oil\n700g tofu\n4 cloves garlic\n1 handful green beans, diced\n1 red onion, diced\n3 tsp cumin seeds\n1 tsp turmeric\nsprinkle of chilli flakes\nsalt and pepper", "method": "Heat plenty of olive oil in a pan over medium heat. Add the diced red onion, garlic and green beans and cook until softening.\nCrumble in the tofu, then add the cumin seeds, turmeric, chilli flakes and salt and pepper.\nCook, stirring, until heated through. Serve with avocado.", "source": "", "notes": "From personal notes. The original note listed ingredients only ('serve with avo'), so the method here is a sensible reconstruction.", "favorite": false, "createdAt": 1782000300003}];</script>

<script>
(function () {
  "use strict";
  const STORE_KEY = "myRecipes_v1";
  // The fixed set of categories, shown in this order. A recipe can be in any number of them.
  const CATEGORIES = ["Curries", "Salad", "Pastas", "Mexican", "Vegan/Vegetarian", "Fish", "Meat/Poultry", "Soups", "Slow Cooker", "Stir Fry", "Breakfast"];
  const UNCAT = "Uncategorised";
  const $ = (s, el = document) => el.querySelector(s);
  const $$ = (s, el = document) => Array.from(el.querySelectorAll(s));

  let recipes = load();
  let activeCategory = "all";   // "all" | "favorites" | a category | UNCAT
  let searchTerm = "";

  /* ---------- storage ---------- */
  function load() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      // First open with bundled recipes: seed storage once (only when nothing saved yet,
      // so it never overwrites edits made on this device).
      if (raw === null && Array.isArray(window.SEED_RECIPES) && window.SEED_RECIPES.length) {
        const seeded = window.SEED_RECIPES.map(normalize);
        localStorage.setItem(STORE_KEY, JSON.stringify(seeded));
        return seeded;
      }
      const data = raw ? JSON.parse(raw) : [];
      return data.map(normalize);
    } catch (e) { return []; }
  }
  // accept both new {categories:[]} and legacy {category:"..."}
  function normalize(r) {
    let cats = [];
    if (Array.isArray(r.categories)) cats = r.categories.filter(c => typeof c === "string" && c.trim());
    else if (typeof r.category === "string" && r.category.trim()) cats = [r.category.trim()];
    return {
      id: r.id || uid(),
      title: String(r.title || ""),
      categories: cats,
      ingredients: r.ingredients || "",
      method: r.method || "",
      source: r.source || "",
      notes: r.notes || "",
      image: r.image || "",
      favorite: !!r.favorite,
      createdAt: r.createdAt || Date.now(),
    };
  }
  function save() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(recipes));
    } catch (e) {
      toast("⚠️ Storage full — try removing some photos");
    }
  }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  /* ---------- helpers ---------- */
  function belongsTo(r, cat) {
    if (cat === UNCAT) return r.categories.length === 0;
    return r.categories.includes(cat);
  }
  // categories actually in use, in the canonical order, plus any stragglers
  function usedCategories() {
    const present = new Set(recipes.flatMap(r => r.categories));
    const ordered = CATEGORIES.filter(c => present.has(c));
    const extras = [...present].filter(c => !CATEGORIES.includes(c)).sort((a, b) => a.localeCompare(b));
    return ordered.concat(extras);
  }

  /* ---------- rendering ---------- */
  function renderChips() {
    const wrap = $("#categoryChips");
    const favCount = recipes.filter(r => r.favorite).length;
    let html = `<span class="chip ${activeCategory === "all" ? "active" : ""}" data-cat="all">All <span class="count-badge">${recipes.length}</span></span>`;
    html += `<span class="chip fav ${activeCategory === "favorites" ? "active" : ""}" data-cat="favorites">★ Favorites <span class="count-badge">${favCount}</span></span>`;
    usedCategories().forEach(c => {
      const n = recipes.filter(r => belongsTo(r, c)).length;
      html += `<span class="chip ${activeCategory === c ? "active" : ""}" data-cat="${escapeAttr(c)}">${escapeHtml(c)} <span class="count-badge">${n}</span></span>`;
    });
    const uncatN = recipes.filter(r => r.categories.length === 0).length;
    if (uncatN) {
      html += `<span class="chip ${activeCategory === UNCAT ? "active" : ""}" data-cat="${UNCAT}">${UNCAT} <span class="count-badge">${uncatN}</span></span>`;
    }
    wrap.innerHTML = html;
    $$(".chip", wrap).forEach(ch => ch.onclick = () => { activeCategory = ch.dataset.cat; render(); });
  }

  function matchesSearch(r) {
    if (!searchTerm) return true;
    const hay = (r.title + " " + r.ingredients + " " + r.notes + " " + r.categories.join(" ")).toLowerCase();
    return hay.includes(searchTerm);
  }

  function render() {
    renderChips();
    const list = $("#recipeList");

    if (recipes.length === 0) {
      list.innerHTML = `<div class="empty"><h2>No recipes yet</h2><p>Tap <b>＋ Add</b> to save your first recipe.</p></div>`;
      return;
    }

    // which category groups to display as headings
    let groupsToShow;
    if (activeCategory === "all" || activeCategory === "favorites") {
      groupsToShow = usedCategories().slice();
      if (recipes.some(r => r.categories.length === 0)) groupsToShow.push(UNCAT);
    } else {
      groupsToShow = [activeCategory];
    }

    const favOnly = activeCategory === "favorites";
    let html = "";
    let shown = 0;
    groupsToShow.forEach(cat => {
      let members = recipes.filter(r => belongsTo(r, cat) && matchesSearch(r) && (!favOnly || r.favorite));
      if (!members.length) return;
      members.sort((a, b) => a.title.localeCompare(b.title));
      shown += members.length;
      html += `<div class="group-title">${escapeHtml(cat)}</div><div class="cards">`;
      members.forEach(r => { html += cardHtml(r); });
      html += `</div>`;
    });

    if (!shown) {
      list.innerHTML = `<div class="empty"><p>No recipes match your search/filter.</p></div>`;
      return;
    }
    list.innerHTML = html;

    // wire up cards (use closest to find the recipe id, since a recipe can appear in multiple groups)
    $$(".card", list).forEach(card => {
      const id = card.dataset.id;
      $(".card-head", card).onclick = (e) => {
        if (e.target.closest(".star-btn")) return;
        card.classList.toggle("open");
      };
      $(".star-btn", card).onclick = (e) => { e.stopPropagation(); toggleFav(id); };
      const editBtn = $(".btn-edit", card);
      if (editBtn) editBtn.onclick = () => openEdit(id);
    });
  }

  function cardHtml(r) {
    const ingredients = (r.ingredients || "").split("\n").map(s => s.trim()).filter(Boolean);
    const thumb = r.image
      ? `<img class="card-thumb" src="${r.image}" alt="">`
      : `<div class="card-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.5rem;">🍽️</div>`;
    const tags = r.categories.map(c => `<span class="tag">${escapeHtml(c)}</span>`).join("");
    return `
      <div class="card" data-id="${r.id}">
        <div class="card-head">
          ${thumb}
          <div class="card-title-wrap">
            <p class="card-title">${escapeHtml(r.title)}</p>
            <div class="card-meta">${ingredients.length} ingredient${ingredients.length === 1 ? "" : "s"}${r.source ? " · 🔗 link" : ""}</div>
            ${tags ? `<div class="card-tags">${tags}</div>` : ""}
          </div>
          <button class="star-btn ${r.favorite ? "on" : ""}" title="Favorite">${r.favorite ? "★" : "☆"}</button>
        </div>
        <div class="card-body">
          ${ingredients.length ? `<h4>Ingredients</h4><ul>${ingredients.map(i => `<li>${escapeHtml(i)}</li>`).join("")}</ul>` : ""}
          ${r.method ? `<h4>Method</h4><p>${escapeHtml(r.method)}</p>` : ""}
          ${r.notes ? `<h4>Notes</h4><p>${escapeHtml(r.notes)}</p>` : ""}
          ${r.source ? `<h4>Source</h4><p><a href="${escapeAttr(r.source)}" target="_blank" rel="noopener">${escapeHtml(r.source)}</a></p>` : ""}
          <div class="card-actions">
            <button class="small btn-edit">✏️ Edit</button>
          </div>
        </div>
      </div>`;
  }

  function toggleFav(id) {
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    r.favorite = !r.favorite;
    save();
    render();
  }

  /* ---------- add / edit ---------- */
  let pendingImage = "";

  function renderCatChecks(selected) {
    const sel = new Set(selected);
    // canonical categories first, then any custom ones already on the recipe
    const all = CATEGORIES.concat([...sel].filter(c => !CATEGORIES.includes(c)));
    $("#catChecks").innerHTML = all.map(c => {
      const on = sel.has(c);
      return `<label class="cat-check ${on ? "checked" : ""}"><input type="checkbox" value="${escapeAttr(c)}" ${on ? "checked" : ""}>${escapeHtml(c)}</label>`;
    }).join("");
    $$("#catChecks input").forEach(cb => {
      cb.onchange = () => cb.closest(".cat-check").classList.toggle("checked", cb.checked);
    });
  }

  function openEdit(id) {
    const r = id ? recipes.find(x => x.id === id) : null;
    $("#editTitle").textContent = r ? "Edit Recipe" : "Add Recipe";
    $("#f_id").value = r ? r.id : "";
    $("#f_title").value = r ? r.title : "";
    renderCatChecks(r ? r.categories : []);
    $("#f_ingredients").value = r ? r.ingredients : "";
    $("#f_method").value = r ? (r.method || "") : "";
    $("#f_source").value = r ? (r.source || "") : "";
    $("#f_notes").value = r ? (r.notes || "") : "";
    pendingImage = r ? (r.image || "") : "";
    const prev = $("#imgPreview");
    if (pendingImage) { prev.src = pendingImage; prev.style.display = "block"; }
    else { prev.style.display = "none"; prev.src = ""; }
    $("#f_image").value = "";
    $("#btnDelete").style.display = r ? "inline-block" : "none";
    showModal("#editModal");
    $("#f_title").focus();
  }

  function saveRecipe() {
    const title = $("#f_title").value.trim();
    if (!title) { toast("Please enter a title"); $("#f_title").focus(); return; }
    const id = $("#f_id").value;
    const categories = $$("#catChecks input:checked").map(cb => cb.value);
    const data = {
      title,
      categories,
      ingredients: $("#f_ingredients").value.trim(),
      method: $("#f_method").value.trim(),
      source: $("#f_source").value.trim(),
      notes: $("#f_notes").value.trim(),
      image: pendingImage,
    };
    if (id) {
      const r = recipes.find(x => x.id === id);
      Object.assign(r, data, { updatedAt: Date.now() });
    } else {
      recipes.push(Object.assign({ id: uid(), favorite: false, createdAt: Date.now() }, data));
    }
    save();
    hideModal("#editModal");
    render();
    toast(id ? "Recipe updated" : "Recipe added");
  }

  function deleteRecipe() {
    const id = $("#f_id").value;
    const r = recipes.find(x => x.id === id);
    if (!r) return;
    if (!confirm(`Delete "${r.title}"? This can't be undone.`)) return;
    recipes = recipes.filter(x => x.id !== id);
    save();
    hideModal("#editModal");
    render();
    toast("Recipe deleted");
  }

  // shrink images so localStorage doesn't fill up
  function handleImageFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const max = 800;
        let { width, height } = img;
        if (width > max || height > max) {
          const ratio = Math.min(max / width, max / height);
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        pendingImage = canvas.toDataURL("image/jpeg", 0.7);
        const prev = $("#imgPreview");
        prev.src = pendingImage; prev.style.display = "block";
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  /* ---------- shopping list ---------- */
  function openShop() {
    const wrap = $("#shopRecipes");
    if (recipes.length === 0) { wrap.innerHTML = `<p class="hint">Add some recipes first.</p>`; }
    else {
      wrap.innerHTML = [...recipes]
        .sort((a, b) => a.title.localeCompare(b.title))
        .map(r => `<label class="shop-recipe-row"><input type="checkbox" value="${r.id}"> ${escapeHtml(r.title)} <span class="count-badge">${escapeHtml(r.categories.join(", "))}</span></label>`)
        .join("");
    }
    $("#shopOutput").style.display = "none";
    $("#btnCopyList").style.display = "none";
    showModal("#shopModal");
  }

  function generateList() {
    const ids = $$('#shopRecipes input:checked').map(i => i.value);
    if (ids.length === 0) { toast("Pick at least one recipe"); return; }
    const lines = [];
    ids.forEach(id => {
      const r = recipes.find(x => x.id === id);
      if (!r) return;
      r.ingredients.split("\n").map(s => s.trim()).filter(Boolean).forEach(i => lines.push(i));
    });
    const seen = new Set(); const unique = [];
    lines.forEach(l => { const k = l.toLowerCase(); if (!seen.has(k)) { seen.add(k); unique.push(l); } });
    unique.sort((a, b) => a.localeCompare(b));
    $("#shopList").textContent = unique.join("\n");
    $("#shopOutput").style.display = "block";
    $("#btnCopyList").style.display = "inline-block";
    $("#btnCopyList").dataset.text = unique.join("\n");
  }

  function copyList() {
    const text = $("#btnCopyList").dataset.text || "";
    navigator.clipboard.writeText(text)
      .then(() => toast("Copied! Paste into the Woolworths app 🛒"))
      .catch(() => toast("Couldn't copy — select and copy manually"));
  }

  /* ---------- export / import ---------- */
  function exportData() {
    if (recipes.length === 0) { toast("Nothing to export yet"); return; }
    const blob = new Blob([JSON.stringify(recipes, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const d = new Date();
    const stamp = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    a.href = url; a.download = `my-recipes-${stamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast("Backup downloaded");
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) throw new Error("bad format");
        const mode = recipes.length === 0
          ? "replace"
          : (confirm(`Import ${data.length} recipe(s).\n\nOK = merge with your current ${recipes.length}.\nCancel = replace everything.`) ? "merge" : "replace");
        const cleaned = data.filter(r => r && r.title).map(normalize);
        if (mode === "replace") recipes = cleaned;
        else {
          const ids = new Set(recipes.map(r => r.id));
          cleaned.forEach(r => { if (ids.has(r.id)) r.id = uid(); recipes.push(r); });
        }
        save(); render();
        toast(`Imported ${cleaned.length} recipe(s)`);
      } catch (err) {
        toast("⚠️ That file isn't a valid recipe backup");
      }
    };
    reader.readAsText(file);
  }

  /* ---------- modal helpers ---------- */
  function showModal(sel) { $(sel).classList.add("show"); document.body.style.overflow = "hidden"; }
  function hideModal(sel) { $(sel).classList.remove("show"); document.body.style.overflow = ""; }

  /* ---------- toast ---------- */
  let toastTimer;
  function toast(msg) {
    const t = $("#toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
  }

  /* ---------- escaping ---------- */
  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }

  /* ---------- events ---------- */
  $("#btnAdd").onclick = () => openEdit(null);
  $("#btnSave").onclick = saveRecipe;
  $("#btnDelete").onclick = deleteRecipe;
  $("#btnShop").onclick = openShop;
  $("#btnGenList").onclick = generateList;
  $("#btnCopyList").onclick = copyList;
  $("#btnExport").onclick = exportData;
  $("#btnImport").onclick = () => $("#importFile").click();
  $("#importFile").onchange = e => { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ""; };
  $("#f_image").onchange = e => handleImageFile(e.target.files[0]);
  $("#search").oninput = e => { searchTerm = e.target.value.trim().toLowerCase(); render(); };

  $$(".modal-bg").forEach(bg => {
    bg.addEventListener("click", e => { if (e.target === bg) hideModal("#" + bg.id); });
  });
  $$("[data-close]").forEach(b => b.onclick = () => hideModal("#" + b.closest(".modal-bg").id));
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") $$(".modal-bg.show").forEach(m => hideModal("#" + m.id));
  });

  render();
})();
</script>
</body>
</html>
